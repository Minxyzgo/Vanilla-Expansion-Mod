#——模組區塊——

#颶風星-主線
sector.ve-barrier-hill.name = 屏障山
sector.ve-barrier-hill.description = 這片山脈旁適合進行初期的發展。從廢墟中獲取[accent]同構科技[]，迅速做好迎敵準備。
sector.ve-barrier-hill.details = 早在登陸零號地區之前，敵人就已通過星際發射站抵達[#90DBFF]颶風星[]了。遍布蔁孢星的敵軍勢力只不過是廢棄殘留的程序而已。
sector.ve-carbon-relics.name = 碳巖遺址
sector.ve-carbon-relics.description = 行蹤已經暴露。附近檢測到有敵方[red]未知型號的單位[]出現。\n生產[accent]石英[]和[accent]矽[]等資源，盡快完善後勤與防線。
sector.ve-carbon-relics.details = 這些敵方單位火力比蔁孢星上的更強，卻與後者有許多相似之處，很可能是敵人獲取科技後自行研發的。
sector.ve-wetland-miningfield.name = 濕地礦場
sector.ve-wetland-miningfield.description = 敵人正在此建造資源站。\n試著用單位奪下區塊，擴大生產規模用於研究。
sector.ve-intervalley.name = 間丘谷
sector.ve-intervalley.description = 檢測到敵方[red]強化單位[]增多。\n從廢墟中回收數據，研究[accent]矽化物[]加固防線。
sector.ve-intervalley.details = 在強化單位的火力下，這種上千年前就有的非金屬材料製成裝甲意外地好使。
sector.ve-volcanic-top.name = 火山口
sector.ve-volcanic-top.description = 這座火山方才噴發，熔巖遍地都是，敵人先一步到達這裏利用地熱能。\n試著利用[accent]懸浮艇單位[]飛躍地形，摧毀敵方核心。
sector.ve-volcanic-top.details = 研究懸浮艇單位的同時，也可仿造[accent]另一類單位[]輔助進攻。
sector.ve-fort-port.name = 堡壘港
sector.ve-fort-port.description = 這片島嶼有[accent]鉻[]礦分布，開采它以擴展流體科技，抵禦從各方向襲來的敵人。
sector.ve-gobi.name = 戈壁灘
sector.ve-gobi.description = 遍布水窪的荒地上有一座敵方基地，且檢測到改良[accent]發射台[]技術可在這個星球上順暢使用。\n獲取數據，從粉碎的頁巖中提煉[accent]鈦[]，開始組建物流系統輔助未來的進攻。
sector.ve-fungus-factory.name = 真菌工廠
sector.ve-fungus-factory.description = 敵人找回了孢子合成技術，正在此區塊量產孢子。\n為防止颶風星變成第二個蔁孢星，進攻時請務必註意避開那些[red]培養機[]。\n研究更安全的培養設備，用孢子製造石油，生產[accent]塑鋼[]。
sector.ve-unit-laboratory.name = 單位研究所
sector.ve-unit-laboratory.description = 這裏就是[red]強化單位[]最初研究與製造的設施。\n攻下這裏，獲取新型號的單位。
sector.ve-shale-quarry.name = 頁巖采石場
sector.ve-shale-quarry.description = 這裏有一小片石油湖和大量頁巖可供利用。\n開采[accent]鈷[]，打造新材料[accent]纖鋼[]，翻新各種設施。
sector.ve-ruins.name = 斷壁殘垣
sector.ve-ruins.description = 敵人占據了[orange]不明陣營[]的基地，其很有可能是颶風星科技數據庫的根本來源。\n可利用此處大量的鉻礦量產[accent]巨浪合金[]。
sector.ve-thorium-hacienda.name = 釷礦山
sector.ve-thorium-hacienda.description = 這個區塊遍布大量的[accent]釷[]，也有敵人的部分采礦設施。\n獲取資源，用更強的防線抵禦敵人的進攻。
sector.ve-nuclear-powerplant.name = 核電站
sector.ve-nuclear-powerplant.description = 敵方核電站在此向其他區塊輸送電力。\n逐步摧毀敵方核心，破壞敵人後勤的一大電力來源。
sector.ve-warp-tech-base.name = 空間技術中心
sector.ve-warp-tech-base.description = 敵人在這裏研究並試用某種空間技術材料，同時設置了強力防空炮組。\n破解科技後，利用這種材料升級鉆頭、擴大儲存，克服地形障礙輔助地面單位進攻，逐步攻下區塊。
sector.ve-prime-route.name = 主幹道
sector.ve-prime-route.description = 此處是敵人的主要運輸路線。\n快速完善防線與後勤，抵禦敵人的襲擊並占領這裏。
sector.ve-planetary-cargo-center.name = 行星驛站
sector.ve-planetary-cargo-center.description = 這是敵人最初登陸颶風星的區塊，也是現在的總部。\n破壞這裏的設施，切斷其物流補給線。
sector.ve-retreat-zone.name = 撤離區
sector.ve-retreat-zone.description = [#f25555]星球最終區塊[]\n[#f25555]BOSS戰：超維[]\n區塊接連丟失，後勤徹底中斷，敵人集中資源再次建造了一座發射站，正準備撤退到其他星球。\n利用後勤盡快摧毀那些加速器和核心。
#颶風星-支線
sector.ve-isolate-island.name = 絕緣島
sector.ve-isolate-island.description = [#90dbff]支線區塊[]\n遠離大陸的海域有一座偏僻小島，其上是一些廢棄的生物技術設施。\n在敵人趕來之前合成並培養[accent]雜交生物[]，利用它危險的特性對抗敵人的進攻。
sector.ve-silicon-facility.name = 巖矽廠區
sector.ve-silicon-facility.description = [#90dbff]支線區塊[]\n這是敵人後勤的發射站之一。試著用[accent]強化單位[]破壞它。
sector.ve-blast-test.name = 試爆區
sector.ve-blast-test.description = [#90dbff]支線區塊[]\n釷豆爬爬的誕生地。新修建的相織布產線覆蓋了被爆炸摧殘的地形。\n占領這裏便可獲取科技。
sector.ve-cross-forest.name = 交錯林地
sector.ve-cross-forest.description = [#90dbff]支線區塊[]\n茂密的樹林占據了這個區塊的大部分空間。適當拆除樹木為產線騰出空間，抵禦敵人。

#風衛一-教程地圖
sector.ve-tutorial-floor-crusher.name = 教程：地面粉碎機
sector.ve-tutorial-floor-crusher.description = [#98ffa9]教程地圖[]
sector.ve-tutorial-blocking-wall.name = 教程：阻敵墻
sector.ve-tutorial-blocking-wall.description = [#98ffa9]教程地圖[]
