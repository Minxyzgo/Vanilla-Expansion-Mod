unit.ve-gatling-mech-sharded.description = [#ffd37f]武装载具[]\n装载一台重机枪的四足机甲，移动缓慢但火力强劲。
unit.ve-combat-engineer.description = [#ffd37f]武装载具[]\n既能辅助建造、采矿和维修，又能发射带电分裂导弹攻击敌人。装有修复场和一对单点防御炮台。
