#電力描述
block.ve-internal-combustion-generator.description = 通過石油的燃燒推動轉子來發電。
block.ve-solid-fuel-cell.description = 將固體燃料的化學能通過特定的電極直接轉化為電能。
block.ve-advanced-node.description = 通過激光傳導電力。連接範圍更大，但只能橫縱連接，適用於遠程輸電。
block.ve-isomorphic-node.description = 通過激光傳導電力。連接範圍較小，適用於小範圍內快捷通電。
block.ve-fluid-fuel-cell.description = 將液體或氣體燃料的化學能通過特定的電極直接轉化為電能。
block.ve-large-combustion-generator.description = 利用燃料的燃燒發電。
