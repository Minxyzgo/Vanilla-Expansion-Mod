#特殊單位描述
unit.ve-assembly-drone-ve.description = [#ffd37f]特殊單位[]\n自動裝配組裝廠指定的單位。
unit.ve-assembly-drone-hyper.description = [#ffd37f]特殊單位[]\n自動裝配組裝廠指定的單位。\n能自行攻擊靠近的敵人。
unit.ve-thorium-blaster.description = [#ffd37f]特殊單位[]\n爬向敵人並自爆。能跨越大多數地形。\n兩側的副炮可輔助清除誘爆障礙。
unit.ve-thorium-bomber.description = [#ffd37f]特殊單位[]\n將熱量以等離子火焰形式噴向敵人，引燃建築。\n被擊落後會爆炸。
unit.ve-thorium-rocketeer.description = [#ffd37f]特殊單位[]\n向遠處發射小型核彈。
unit.ve-thorium-rocketeer-missile.description = 
