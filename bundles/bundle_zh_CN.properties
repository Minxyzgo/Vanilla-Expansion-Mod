#赛卫一-社区地图
sector.ve-community-entrance.name = 社区地图入口
sector.ve-community-entrance.description = 社区地图的发射站。
sector.ve-community-xingyunpendi.name = 星陨盆地
sector.ve-community-xingyunpendi.description = [green]社区地图[]\n这是靠近敌方基地群的一块大盆地，经历过多轮陨石撞击，增添了原本贫瘠的矿藏，东侧还有一块敌方留下的废弃开发区。\n由于敌方防空火力强大，着陆时我们不得不抛弃了大部分发射物资以高速突入，并且敌方防空火力已经封锁了近地轨道，发射物资只会使物资仓成为靶子。\n[green]by I'm 人机[]
sector.ve-community-huoshankou.name = 火山口
sector.ve-community-huoshankou.description = [green]社区地图[]\n占领火山脚下后，继续向上推进，便是这敌军基地。\n敌人在这座[red]活火山口[]建立了基地以向[yellow]实验室[]运送硫化物。\n总部已向你这里发送[blue]钛[]和[blue]钴[]，摧毁这里，切断敌人的硫化物来源。\n注意：火山里似乎[red]有什么东西[]......\n[green]by [][pink]屑钍.exe[]
sector.ve-community-yunshikeng.name = 陨石坑
sector.ve-community-yunshikeng.description = [green]社区地图[]\n这是一处陨石坑内的敌方重要基地，敌人在这里设下了层层防御。\n利用陨石带来的丰富矿藏建立防线，三十分钟后我们的支援将会到达......\n任务：摧毁敌方防线。\n[green]by 不说话的tr[]
sector.ve-community-leimingliegu.name = 雷鸣裂谷
sector.ve-community-leimingliegu.description = [green]社区地图[]\n这里是敌方的重守据点之一，击垮这里。\n我方支援已在路上，但敌方的支援也在路上。\n做好准备。\n[green]by 风颂子[]
sector.ve-community-lieguqianshao.name = 裂谷前哨
sector.ve-community-lieguqianshao.description = [green]社区地图[]这里是地方的一个小型据点，也许是因为由苍穹带领的缘故，这里的防守并不是特别强悍。\n这里的铝矿矿产丰富，攻占这里，拿下这里的铝矿矿脉。\n不过处于临近区块的敌方基地已经接收到了苍穹的支援请求。\n做好准备。\n[green]by 风颂子[]
sector.ve-community-xingyunxueshan.name = 星陨雪山
sector.ve-community-xingyunxueshan.description = [green]社区地图[]\n我们在这里检测到了含有钛的陨石，这里对于我们来说十分重要，守住这里，不要让敌人有可乘之机。\n[green]by 苏修的德三[]

#玛瑞斯-主线
sector.ve-negotiation.name = 谈判点
sector.ve-negotiation.description = 敌人撤退到了这颗星球上，企图与本地[#00ffce]外星文明[]联手。\n保持警惕。着陆后迅速研究并生产新资源，抵御敌人间断袭来的部队。
sector.ve-temporary-frontier.name = 临时阵地
sector.ve-industrial-hub.name = 工业枢纽
sector.ve-war-headquarters.name = 备战总部
sector.ve-reunion.name = 复现
sector.ve-mirror-swamp.name = 镜林潭
sector.ve-mirror-swamp.description = 进入沼泽，繁茂的镜面植物是玛瑞斯生态缓慢恢复的表现之一，同时大量出现的[accent]铬[]矿意味着这里可重新使用已获得的科技。\n敌人的反抗进一步增强，注意各方来袭的单位。
sector.ve-misty-valley.name = 晃雾岭
sector.ve-halo-mountains.name = 虹晕谷
sector.ve-third-facility.name = 三号厂区
sector.ve-icy-boundary.name = 寒尘界限
sector.ve-icy-boundary.description = 冰川地带的边缘。\n[accent]银[]矿在这里的分布显著增加，利用它们开发[accent]热量系统[]，或通过[accent]物流锚点[]兑换资源。
sector.ve-metallic-glacier.name = 霜金河
sector.ve-radioactive-islands.name = 辐光川流
sector.ve-omni-monitor.name = 观测站
sector.ve-lower-pass.name = 谷地通道
sector.ve-slate-guardpost.name = 暗岩哨站
sector.ve-surface-cracks.name = 地壳裂隙
sector.ve-thermal-powerplant.name = 热能电厂

#西楚洛斯-主线
sector.ve-melon-onset.name = 始瓜地区
sector.ve-melon-onset.description = 这颗星球不含硅，但仍有机会发展起来。\n在外星势力的引导下完成开局，抵御苍穹们的进攻吧。
sector.ve-fruit-flats.name = 瓜瓤平原
sector.ve-fruit-flats.description = 尝试利用新的科技生产[accent]硅化物[]与[accent]致密瓤粉[]，强化防线。
sector.ve-vascular-race.name = 竞速岭谷
sector.ve-boss-melevour.name = 暴走矿机
sector.ve-tainted-seaport.name = 环孢海港
sector.ve-spore-challenge.name = 赴糖蹈火
sector.ve-boss-fungitron.name = 疫械集群
sector.ve-boss-fungitron.description = [#f25555]BOSS战：菌噬体[]\n首个被孢子侵染而程序错乱的苍穹如今已变成一团扭曲的半机械生物体，四处游荡并吞噬其他单位，潜在威胁极大。\n利用银子弹和孢子炸弹趁早摧毁它。
sector.ve-melon-delivery.name = 瓜运中心
sector.ve-steath-stronghold.name = 糖监要塞
sector.ve-sky-strike.name = 直击苍穹
sector.ve-boss-zentack.name = 裂空战舰
sector.ve-boss-zentack.description = [#f25555]BOSS战：西击舰[]\n这艘大型飞船巡视并守护着苍穹国度的领空，它的激光威力不容小觑。\n利用要塞的装甲拖延并尽快从内部弱点开始破坏它，将核心安全运送至星球敌军总部附近。
sector.ve-zenith-castle.name = 庆云城堡
sector.ve-boss-chiniun.name = 瓜星领主
sector.ve-boss-chiniun.description = [#f25555]星球最终区块[]\n[#f25555]BOSS战：庆云君[]\n苍穹国度的君王已在总部广场等候多时。\n通过移动、助推与建造来躲避弹幕，趁机释放干扰弹打断对手的进攻，完成西楚洛斯最后的考验吧。

#加维纳-主线
sector.ve-boss-cruxframe.name = [#f25555]落幕[]
sector.ve-boss-cruxframe.description = [#f25555]星球最终区块[]\n[#f25555]BOSS战：赤色根源[]\n是时候结束这一切了。



