#風衛一-高難地圖
sector.ve-hardcore-barrier-hill.name = hc屏障山
sector.ve-hardcore-barrier-hill.description = [#f25555]高難版地圖[]\n[green]by closesnew
sector.ve-hardcore-carbon-relics.name = hc碳岩遺址
sector.ve-hardcore-carbon-relics.description = [#f25555]高難版地圖[]\n[green]by closesnew
sector.ve-hardcore-intervalley.name = hc間丘谷
sector.ve-hardcore-intervalley.description = [#f25555]高難版地圖[]\n[green]by closesnew
#風衛一-社區地圖
sector.ve-community-entrance.name = 社區地圖入口
sector.ve-community-entrance.description = 社區地圖的發射站。
sector.ve-community-xingyunpendi.name = 星隕盆地
sector.ve-community-xingyunpendi.description = [green]社區地圖[]\n這是靠近敵方基地群的一塊大盆地，經歷過多輪隕石撞擊，增添了原本貧瘠的礦藏，東側還有一塊敵方留下的廢棄開發區。\n由於敵方防空火力強大，著陸時我們不得不拋棄了大部分發射物資以高速突入，並且敵方防空火力已經封鎖了近地軌道，發射物資只會使物資倉成為靶子。\n[green]by I'm 人機[]
sector.ve-community-huoshankou.name = 火山口
sector.ve-community-huoshankou.description = [green]社區地圖[]\n占領火山腳下後，繼續向上推進，便是這敵軍基地。\n敵人在這座[red]活火山口[]建立了基地以向[yellow]實驗室[]運送硫化物。\n總部已向你這裏發送[blue]鈦[]和[blue]鈷[]，摧毀這裏，切斷敵人的硫化物來源。\n註意：火山裏似乎[red]有什麽東西[]......\n[green]by [][pink]屑釷.exe[]
sector.ve-community-yunshikeng.name = 隕石坑
sector.ve-community-yunshikeng.description = [green]社區地圖[]\n這是一處隕石坑內的敵方重要基地，敵人在這裏設下了層層防禦。\n利用隕石帶來的豐富礦藏建立防線，三十分鐘後我們的支援將會到達......\n任務：摧毀敵方防線。\n[green]by 不說話的tr[]
sector.ve-community-leimingliegu.name = 雷鳴裂谷
sector.ve-community-leimingliegu.description = [green]社區地圖[]\n這裏是敵方的重守據點之一，擊垮這裏。\n我方支援已在路上，但敵方的支援也在路上。\n做好準備。\n[green]by 風頌子[]
sector.ve-community-lieguqianshao.name = 裂谷前哨
sector.ve-community-lieguqianshao.description = [green]社區地圖[]這裏是地方的一個小型據點，也許是因為由蒼穹帶領的緣故，這裏的防守並不是特別強悍。\n這裏的鋁礦礦產豐富，攻占這裏，拿下這裏的鋁礦礦脈。\n不過處於臨近區塊的敵方基地已經接收到了蒼穹的支援請求。\n做好準備。\n[green]by 風頌子[]
sector.ve-community-xingyunxueshan.name = 星隕雪山
sector.ve-community-xingyunxueshan.description = [green]社區地圖[]\n我們在這裏檢測到了含有鈦的隕石，這裏對於我們來說十分重要，守住這裏，不要讓敵人有可乘之機。\n[green]by 蘇修的德三[]

#赤塵星-主線
sector.ve-negotiation.name = 談判點
sector.ve-negotiation.description = 敵人撤退到了這顆星球上，企圖與本地[#00ffce]外星文明[]聯手。\n保持警惕。著陸後迅速研究並生產新資源，抵禦敵人間斷襲來的部隊。
sector.ve-temporary-frontier.name = 臨時陣地
sector.ve-industrial-hub.name = 工業樞紐
sector.ve-war-headquarters.name = 備戰總部
sector.ve-reunion.name = 復現
sector.ve-mirror-swamp.name = 鏡林潭
sector.ve-mirror-swamp.description = 進入沼澤，繁茂的鏡面植物是赤塵星生態緩慢恢復的表現之一，同時大量出現的[accent]鉻[]礦意味著這裏可重新使用已獲得的科技。\n敵人的反抗進一步增強，註意各方來襲的單位。
sector.ve-misty-valley.name = 晃霧嶺
sector.ve-halo-mountains.name = 虹暈谷
sector.ve-third-facility.name = 三號廠區
sector.ve-icy-boundary.name = 寒塵界限
sector.ve-metallic-glacier.name = 霜金河
sector.ve-radioactive-islands.name = 輻光川流
sector.ve-omni-monitor.name = 觀測站
sector.ve-lower-pass.name = 谷地通道
sector.ve-slate-guardpost.name = 暗巖哨站
sector.ve-surface-cracks.name = 地殼裂隙
sector.ve-thermal-powerplant.name = 熱能電廠

#西瓤星-主線
sector.ve-melon-onset.name = 始瓜地區
sector.ve-melon-onset.description = 這顆星球不含矽，但仍有機會發展起來。\n在外星勢力的引導下完成開局，抵禦蒼穹們的進攻吧。
sector.ve-fruit-flats.name = 瓜瓤平原
sector.ve-fruit-flats.description = 嘗試利用新的科技生產[accent]矽化物[]與[accent]致密瓤粉[]，強化防線。
sector.ve-vascular-race.name = 競速嶺谷
sector.ve-boss-melevour.name = 暴走礦機
sector.ve-tainted-seaport.name = 環孢海港
sector.ve-spore-challenge.name = 赴糖蹈火
sector.ve-boss-fungitron.name = 疫械集群
sector.ve-boss-fungitron.description = [#f25555]BOSS戰：菌噬體[]\n首個被孢子侵染而程序錯亂的蒼穹如今已變成一團扭曲的半機械生物體，四處遊蕩並吞噬其他單位，潛在威脅極大。\n利用銀子彈和孢子炸彈趁早摧毀它。
sector.ve-melon-delivery.name = 瓜運中心
sector.ve-steath-stronghold.name = 糖監要塞
sector.ve-sky-strike.name = 直擊蒼穹
sector.ve-boss-zentack.name = 裂空戰艦
sector.ve-boss-zentack.description = [#f25555]BOSS戰：西擊艦[]\n這艘大型飛船巡視並守護著蒼穹國度的領空，它的激光威力不容小覷。\n利用要塞的裝甲拖延並盡快從內部弱點開始破壞它，將核心安全運送至星球敵軍總部附近。
sector.ve-zenith-castle.name = 慶雲城堡
sector.ve-boss-chiniun.name = 瓜星領主
sector.ve-boss-chiniun.description = [#f25555]星球最終區塊[]\n[#f25555]BOSS戰：慶雲君[]\n蒼穹國度的君王已在總部廣場等候多時。\n通過移動、助推與建造來躲避彈幕，趁機釋放幹擾彈打斷對手的進攻，完成西瓤星最後的考驗吧。



