unit.ve-frost-fortress.description = [#ffd37f]特殊单位[]\n发射冰镇炮弹使敌人减速。
unit.ve-firebee.description = [#ffd37f]特殊单位[]\n发射单点脉冲激光和对地导弹。\n能缓慢自我修复。
unit.ve-melonic-array-core.description = [#ffd37f]特殊单位[]\n自动对大范围内的敌人发动爆破激光束攻击。\n可被西瓤阵列桩治疗并强化。
