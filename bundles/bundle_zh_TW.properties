unit.ve-iota-fungikiller.description = [#ffd37f]西瓤星核心機[]\n裝載銀子彈機炮，可有效殺傷孢染機械。
unit.ve-iota-stg.description = [#ffd37f]西瓤星核心機[]\n向右連續發射能量彈。
unit.ve-iota.description = [#ffd37f]西瓤星核心機[]\n連發激光彈維修己方建築。\n可改裝成其他型號。
unit.ve-iota-stealth.description = [#ffd37f]西瓤星核心機[]\n未裝有武器，能夠緩慢自我修復。
unit.ve-iota-final.description = [#ffd37f]西瓤星核心機[]\n能快速發射一連串激光彈進行攻擊。\n向背後攻擊可釋放追蹤幹擾彈。\n能夠助推躲避地面上的威脅。
