sector.planetaryTerminal.description = [#f25555]星球最終區塊[]\n最終目標。\n\n這個海岸基地有一個能將核心發射到其它行星的設施，防守非常嚴密。\n\n生產海軍單位，盡快消滅敵人，研究發射建築。
sector.origin.description = [#f25555]星球最終區塊[]\n最終區塊，敵人數量極多。\n所有科技均已研究完畢，只需摧毀所有敵方基地。

