#电力描述
block.ve-internal-combustion-generator.description = 通过石油的燃烧推动转子来发电。
block.ve-solid-fuel-cell.description = 将固体燃料的化学能通过特定的电极直接转化为电能。
block.ve-advanced-node.description = 通过激光传导电力。连接范围更大，但只能横纵连接，适用于远程输电。
block.ve-isomorphic-node.description = 通过激光传导电力。连接范围较小，适用于小范围内快捷通电。
block.ve-fluid-fuel-cell.description = 将液体或气体燃料的化学能通过特定的电极直接转化为电能。
block.ve-large-combustion-generator.description = 利用燃料的燃烧发电。
block.ve-power-battery.description = 储存电力并在发电量不足时供电。
block.ve-isomorphic-node-large.description = 通过激光传导电力。连接范围更大。\n可以稳定浮在液面上，能够在水域自由输电。
