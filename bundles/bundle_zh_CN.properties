#赛克兰特-强化描述
unit.ve-solar.description = [#ffa665]T3强化战门型空军[]\n发射能在路径及落点上分裂出小炸弹的大型炮弹。
unit.ve-plasma.description = [#ffa665]T2强化战门型空军[]\n向后下方连续投掷三枚燃烧弹，能直接引燃范围内的敌方建筑。
unit.ve-prominence.description = [#ffd37f]改装单位[]\n发射火焰弹。能搬运单位与建筑。
unit.ve-blade.description = [#ffa665]T1强化战门型陆军[]\n连续不断地发射追踪子弹。
unit.ve-lance.description = [#ffd37f]改装单位[]\n交替发射分裂子弹。
unit.ve-aurora.description = [#ffa665]T1强化战门型空军[]\n发射带电子弹。
unit.ve-point.description = [#98ffa9]T1强化支援型空军[]\n自动开采矿物并将其放入核心中。\n不会被敌人锁定，能缓慢自我修复。
unit.ve-line.description = [#98ffa9]T2强化支援型空军[]\n发射加速电球。
unit.ve-line.details = 据测试，加速弹射物的射程与初速度呈正相关。
unit.ve-string.description = [#ffd37f]改装单位[]\n发射黏附炸弹。
unit.ve-stardust.description = [#98ffa9]T1强化支援型陆军[]\n散射激光弹。\n使用激光束和修复场修复己方单位。\n能够助推。
unit.ve-hammer.description = [#ffa665]T2强化战门型陆军[]\n喷射矿渣和石油引燃击中点的地面单位与建筑。
unit.ve-hoe.description = [#ffd37f]改装单位[]\n发射一连串穿甲弹。
unit.ve-vortex.description = [#98ffa9]T2强化支援型陆军[]\n发射一连串小电球。\n可为自己及周围的单位提供护盾。\n通过一对单点防御炮台裂解来袭的子弹。\n能够助推。
unit.ve-astrologe.description = [#ffd37f]改装单位[]\n喷射等离子体引燃敌方单位与建筑。\n用小型力场抵御并反弹前方的攻击。能够助推。
unit.ve-ballistic.description = [#ffa665]T3强化战门型陆军[]\n发射迫击炮弹和大型突刺弹。\n可为自己及周围的单位提供护盾。
unit.ve-square.description = [#98ffa9]T3强化支援型空军[]\n连续发射波动激光弹。\n使用两道激光束修复己方单位。\n能压制敌方修复系统。\n可用弧形力场保护自己和旁边的己方单位。
unit.ve-plain.description = [#ffd37f]改装单位[]\n发射电磁脉冲弹损伤敌方电网并提高己方建筑的工作效率。
unit.ve-nebula.description = [#98ffa9]T3强化支援型陆军[]\n向前弹射出大量电球。\n使用两道激光束修复己方单位。\n产生分段式力场保护周围的己方单位。能够助推。
unit.ve-magnetic.description = [#ffa665]T4强化战门型空军[]\n发动猛烈的大型带电子弹攻击。
unit.ve-corona.description = [#ffa665]T5强化战门型空军[]\n发射多发大型穿透分裂炮弹并间断地使用激光束熔化敌人。可向后方投掷小核弹，填装时间长。
unit.ve-stereo.description = [#98ffa9]T4强化支援型空军[]\n发射等离子炸弹和脉冲弹。\n通过一对单点防御炮台裂解来袭的子弹。\n能使用修复场修复己方单位。
unit.ve-firelock.description = [#ffa665]T4强化战门型陆军[]\n配备两门电磁轨道炮。可用穿甲弹近防。
unit.ve-meta.description = [#98ffa9]T5强化支援型空军[]\n产生能量场，其核心可蓄力发射特殊能量弹。搭载两对高频爆炸激光弹炮台。\n使用两道激光束修复己方单位。通过两对单点防御炮台裂解来袭的子弹。
unit.ve-galaxy.description = [#98ffa9]T4强化支援型陆军[]\n发射六向分裂的黏附炸弹。\n使用多对激光束修复己方单位和建筑。能够助推。
unit.ve-universe.description = [#98ffa9]T5强化支援型陆军[]\n在前方生成连锁分裂电球并通过自动激光炮台近防。\n可为周围的己方单位提供护盾。\n使用多道激光束修复己方单位和建筑。能够助推
unit.ve-ray.description = [#ffa665]T5强化战门型陆军[]\n对前方发动直线轰炸。
