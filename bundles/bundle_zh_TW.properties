#颶風星-特種描述
unit.ve-dust.description = [#90dbff]T1懸浮艇[]\n發射一連串高速子彈，射程較遠。\n不會被深水和熔巖等地面因素影響，但仍屬於地面單位。
unit.ve-mist.description = [#90dbff]T2懸浮艇[]\n放置不可被裂解的地雷，碰到地面敵人就會爆炸。
unit.ve-haze.description = [#90dbff]T3懸浮艇[]\n搭載三門衰減炮，其炮彈總傷害隨路程增大及撞擊次數增加而減小。
unit.ve-conscript.description = [#feb380]T1裝甲車[]\n發射小型炮彈。裝甲較厚，耐高溫。
unit.ve-arrange.description = [#feb380]T2裝甲車[]\n向空中敵人發射防空炮彈。
unit.ve-arrange.details = 有時放任它靠近核心並不是個好主意。
unit.ve-hurricane.description = [#90dbff]T4懸浮艇[]\n使用兩挺重機槍持續攻擊，也能釋放導彈擾亂敵軍引擎運作。\n機槍過熱後需要冷卻才能重新啟動。\n能對靠近的空中敵人造成傷害。
unit.ve-charge.description = [#feb380]T3裝甲車[]\n連續發射追蹤導彈打擊敵人。
unit.ve-hurricane-orb.description = 對靠近的空中敵人造成傷害。
unit.ve-hurricane-missile.description = 
unit.ve-smarb.description = [#bf92f9]T1機械蟲[]\n發射弱化激光彈。爬行速度快。
unit.ve-mider.description = [#bf92f9]T2機械蟲[]\n交替發射弱化炮彈。
unit.ve-velocite.description = [#bf92f9]T3機械蟲[]\n發射穿透激光束和弱化光束並在此過程中自我修復。
unit.ve-capture.description = [#feb380]T4裝甲車[]\n發射三發炮彈與兩道持續性激光束。
unit.ve-charge-missile.description = 
unit.ve-flocculate.description = [#ffd37f]反製單位[]\n用小型力場保護並用修復場修復周圍的己方單位。無法自主攻擊。
unit.ve-alleviate.description = [#ffd37f]反製單位[]\n發射懸浮導彈。
unit.ve-alleviate-missile.description = 
unit.ve-meteorology.description = [#90dbff]T5懸浮艇[]\n向前釋放能對周圍敵人持續造成傷害的爆炸閃電球，同時發射密集的分裂沖擊彈。\n能夠助推。
unit.ve-meteorology-orb.description = 
unit.ve-triumph.description = [#feb380]T5裝甲車[]\n發射大型穿透炮彈，在穿透和擊中時分裂出小炸彈。\n可近距離噴射火焰焚燒靠近的敵方單位與建築。
unit.ve-slidoid.description = [#bf92f9]T4機械蟲[]\n用加速能量彈和電弧進行攻擊，同時自我修復。\n配備懸浮裝置以提高速度。
unit.ve-hovopid.description = [#bf92f9]T5機械蟲[]\n發射多個鋸片附著敵人並持續造成傷害，同時近距離使用大型弱化突刺彈進行攻擊。\n配置懸浮裝置以提高速度。

