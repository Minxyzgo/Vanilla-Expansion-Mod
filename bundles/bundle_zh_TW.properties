#描述
item.ve-salt.description = 廣泛存在於海水和鹽堿地中的化合物，是培養植物的重要需求之一。
item.ve-chromium.description = 硬度非常高，可用於製造耐流體腐蝕的容器管道或有機械性能需求的零件，也可作破甲型彈藥。
item.ve-quartz.description = 經純化的巖石成分之一，具有不錯的光學性能，常用於電力節點及激光采礦器，也可作穿透型彈藥。
item.ve-silicide.description = 用於製造耐高溫的零件或堅固的裝甲保護設備的較脆弱部分，可作為擊退型彈藥。
item.ve-cobalt.description = 可用於製造快速運轉和更先進的元件。
item.ve-catalyzon.description = 具有較強的催化活性，其中特定的一部分可用作反應的媒介，提高轉化效率。
item.ve-aluminium.description = 常見而不易銹蝕，多用於基礎設備及其外殼。
item.ve-warp-nucleus.description = 高能量的相位激發產物，用於高級效應場技術和空間技術。
item.ve-fibralt.description = 用於製造高級機械組件和大型單位部件，也可作為高速穿透型彈藥。
item.ve-plant-matter.description = 綠色植物的組織。
item.ve-plant-matter.details = 綠色植物已經很久沒有出現過了。它們經機器轉化成其他燃料的比率更高且無毒，但增殖速度不如孢子。\n如果將其與孢子融合呢？
item.ve-nitroalkoss.description = 經融合與編輯製造出的生命形式，會在體內積累易燃易爆的物質，多以化能合成作用為自己供能。
item.ve-nitroalkoss.details = 這是一個跨星球人造物種，繼承了孢子與綠色植物各自的部分特性。它積攢的物質不僅有著極高的爆炸性，其本體還不會像孢子一樣肆意蔓延或釋放毒氣，有望成為更強的資源。
item.ve-sodium.description = 質地柔軟，性質活潑，能與水發生劇烈反應。
item.ve-shale-cobble.description = 一種沈積巖，可從中提煉鈦。
item.ve-carbon-shale-cobble.description = 一種沈積巖，植物炭化是其一形成因素，含有大量的碳。
item.ve-capacitor.description = 巨浪合金製成的電力儲存元件，儲電能力強但暫時缺少回收技術。
item.ve-capacitor.details = 作者註：一定要與現實世界的電容器相區分！
item.ve-fusion-fuel.description = 用於發生與維持輕核聚變的燃料。
item.ve-ferrum.description = 常見而用途廣泛，有良好的電磁特性。
item.ve-red-soil.description = 與普通沙子成分差別較大，可從中提煉其他資源。
item.ve-astro-plate.description = 對攻擊和環境威脅均有較好防禦效果的裝甲材料。
item.ve-phecteel.description = 外星科技產物，能大幅強化機動性和能量輸出效果。
item.ve-silver.description = 較為稀有而性能優良的金屬。
item.ve-ferric-shale-cobble.description = 一種沈積巖，可從中提煉鐵和硫化物。
item.ve-reflector-matter.description = 分布在赤塵星各處的植物的組織。
item.ve-reflector-matter.details = 這類植物為了在強光輻射環境下生存，演化出了鏡面狀的葉片和高效的光熱利用系統。
item.ve-melon-dirt.description = 西瓜瓤組成的土。
item.ve-sugar.description = 提煉自西瓜的結晶糖，富含化學能。
item.ve-dense-melon-dirt.description = 粉碎並壓縮的瓜瓤粉末，更加易燃。
item.ve-tantalum.description = 擁有極強的熱腐蝕抗性和等離子體相容性。
item.ve-crystallon.description = 瓜瓤成分經處理在無機結構框架上延伸形成的電性纖維材料。
item.ve-mect-complex.description = 效應鋼的仿製品，有與之相似的設備強化作用。
item.ve-motiphite.description = 摻雜各種基本金屬資源的粗合金，結構脆弱但易分離其成分。
item.ve-technolite.description = 含有各種高級金屬資源的粗合金，可提純也可用於製成高端元件。
item.ve-chrysopite.description = 熔自各種重型金屬資源的粗合金，極為堅固且耐侵蝕，各項性能優異。
item.ve-finallite.description = 共生各種終極金屬資源的粗合金，危險而不穩定，應妥善處理。

