#——教程區塊——

#地面粉碎機
text.tutorial-fc.tutorial1 = 颶風星上[accent]沒有礦脈形式的鈦[]。
text.tutorial-fc.tutorial2 = 因此鈦需要從[accent]頁巖[]中提煉得到。
text.tutorial-fc.tutorial3 = 試著使用[accent]地面粉碎機[]開采頁巖，並將其送入[accent]鈦提煉廠[]加工。
text.tutorial-fc.tutorial4 = 地面粉碎機同樣可以開采[accent]炭質頁巖[]。
text.tutorial-fc.tutorial5 = 在[accent]碳巖矽冶煉廠[]中，炭質頁巖可被直接精煉成矽。
text.tutorial-fc.tutorial6 = 試著依靠炭質頁巖獲取一些矽。
text.tutorial-fc.tutorial7 = 除了特殊巖石，地面粉碎機對開采[accent]硫化物[]也有更高的效率。
text.tutorial-fc.tutorial8 = 教程結束。
#阻敵墻
text.tutorial-bw.tutorial1 = [accent]阻敵墻[]是一種帶有小型力場的特殊墻體。
text.tutorial-bw.tutorial2 = 它的力場能夠[accent]阻擋[]敵方單位和穿透性炮彈[accent]越過防線。
text.tutorial-bw.tutorial3 = 嘗試補全阻敵墻，防禦敵方[accent]轟炸機。
text.tutorial-bw.tutorial4 = [accent]重型阻敵墻[]有同樣的作用，但是更加堅固。
text.tutorial-bw.tutorial5 = 補全重型阻敵墻，抵抗更多來襲的敵人。
text.tutorial-bw.tutorial6 = 阻敵墻也可以攔下[accent]釷豆龐龐爆炸的沖擊波。
text.tutorial-bw.tutorial7 = 確保防線完整以應對沖擊波。
text.tutorial-bw.tutorial8 = 教程結束。
#裝配選擇器
text.tutorial-as.tutorial1 = [accent]組裝廠[]需要輸入所需的[accent]載荷[]來製造單位。
text.tutorial-as.tutorial2 = 將[accent]組裝打包機的選項設置為[accent]超級組裝套件[]
text.tutorial-as.tutorial3 = 利用指揮或手動操控[accent]弩炮[]使其進入組裝廠上的載荷軌道
text.tutorial-as.tutorial4 = 單個組裝廠有多種製造方案，但不能直接選擇。
text.tutorial-as.tutorial5 = 此時需要使用[accent]裝配選擇器[]改變組裝廠的模塊等級以切換方案。
text.tutorial-as.tutorial6 = 將[accent]一型裝配選擇器[]正面緊貼組裝廠的區域邊界放置
text.tutorial-as.tutorial7 = 此時組裝廠的模塊等級由0級變為1級，可進行列表中的第二個方案。
text.tutorial-as.tutorial8 = 讓[accent]耀斑[]進入組裝廠
text.tutorial-as.tutorial9 = 將模塊等級進一步升高時，[accent]不能移除[]先前放置的選擇器。
text.tutorial-as.tutorial10 = 例如同時帶有一、二型選擇器才能使模塊等級升高到2級，僅有二型則不行。
text.tutorial-as.tutorial11 = 試著生產剩下兩種方案的單位。
text.tutorial-as.tutorial12 = 教程結束。

#——劇情與提示——

#始瓜地區
text.mo.dialog.intro1 = [#00ffce]你好呀。
text.mo.dialog.intro2 = [#00ffce]這裏是Lacuna，來自[#de8a5b]赤塵星[#00ffce]的陣營。
text.mo.dialog.intro3 = [#00ffce]我們並非來此宣戰，只是一小筆交易。
text.mo.dialog.intro4 = [#00ffce]你瞧，[#88c961]西瓤星[#00ffce]...它跟別的星球有些不同。
text.mo.dialog.intro5 = [#00ffce]它是西瓜構成的。沒有矽。
text.mo.dialog.intro6 = [#00ffce]由於一次運輸事故...
text.mo.dialog.intro7 = [#9f8c88]鐵[#00ffce]和[#f5e1eb]銀[#00ffce]資源散落到了這裏。
text.mo.dialog.intro8 = [#00ffce]我們對銀的需求量很大。它於我們而言相當寶貴。
text.mo.dialog.intro9 = [#00ffce]我們千方百計嘗試回收，卻一點成效都沒有。
text.mo.dialog.intro10 = [#00ffce]不過我們發現你們的采礦能力很強。
text.mo.dialog.intro11 = [#00ffce]所以，若你們願意伸出援手...
text.mo.dialog.intro12 = [#00ffce]我們保證為你們提供[accent]矽與石墨[#00ffce]的補給。
text.mo.dialog.intro13 = [#00ffce]好了，讓我來帶你開局吧。
text.mo.dialog.intro14 = [#00ffce]...哦草，你的單位挖不了鐵。
text.mo.dialog.intro15 = [#00ffce]稍等。
text.mo.dialog.intro16 = [#00ffce]搞定。
text.mo.tutorial1 = [#00ffce]首先，研究並在此放置[accent]礦物采集器[#00ffce]來開采[#9f8c88]鐵。
text.mo.tutorial2 = [#00ffce]接著，研究[accent]鐵傳送帶[#00ffce]，把物資傳輸到你的核心。
text.mo.tutorial3 = [#00ffce]再多來些怎麽樣？
text.mo.tutorial4 = [#00ffce]好嘞。咱們也開采一些[#f5e1eb]銀[#00ffce]吧？
text.mo.tutorial5 = [#00ffce]繼續保持。
text.mo.tutorial6 = [#00ffce]是時候引入電力了！先挖點瓜瓤土吧。
text.mo.tutorial7 = [#00ffce]研究[accent]西瓜電池、電纜和分配閥[#00ffce]來構建一個簡易發電機組。
text.mo.tutorial8 = [#00ffce]等你完成了，就放置一個[accent]矽氧化器[#00ffce]，我會引導你接下來怎麽做。
text.mo.tutorial9 = [#00ffce]夥計，不錯嘛。
text.mo.tutorial10 = [#00ffce]要接收補給，你需要用到我們的一臺裝置。
text.mo.tutorial11 = [#00ffce]看好了，貿易傳送塔！
text.mo.tutorial12 = [#00ffce]向裝置裏輸入足夠的銀，它就會送來一批物資。
text.mo.tutorial13 = [#00ffce]來試試吧。
text.mo.tutorial13.task = 向[accent]貿易傳送塔[]輸入[accent]銀
text.mo.tutorial14 = [#00ffce]漂亮！現在可以把物資運回核心了。
text.mo.tutorial15 = [#00ffce]你可能討厭用電纜輸電...
text.mo.tutorial16 = [#00ffce]但是別擔心！只要你拿到[#f0d7d7]石英[#00ffce]，就能繼續用電力節點啦！
text.mo.tutorial17 = [#00ffce]借由矽氧化器，矽可被轉化成石英。
text.mo.tutorial18 = [#00ffce]用矽氧化器製作石英。
text.mo.tutorial19 = [#00ffce]在煤礦脈附近建造一臺[accent]回旋渦輪機[#00ffce]來進入下一步。
text.mo.tutorial20 = [#00ffce]這臺發電機比西瓜電池的效率高了不少。
text.mo.tutorial21 = [#00ffce]但它需要礦物采集器挖不了的煤炭。
text.mo.tutorial22 = [#00ffce]因此，[accent]電磁采礦機[#00ffce]是全自動供給它們的最佳選擇。
text.mo.tutorial23 = [#00ffce]研究並在此放置一臺電磁采礦機。
text.mo.tutorial24 = [#00ffce]當一切就緒，[#ffa665]就放一個鐵墻吧。
text.mo.tutorial25 = [#00ffce]你們一直在對付的敵人...就是[#f25555]Crux[#00ffce]，對吧？
text.mo.tutorial26 = [#00ffce]在它們的跨星球航行過程中...
text.mo.tutorial27 = [#00ffce]一支艦隊偏航了，著陸在西瓤星。
text.mo.tutorial28 = [#f25555]蒼穹們[#00ffce]，並沒有嘗試回到[#90dbff]颶風星。
text.mo.tutorial29 = [#00ffce]它們駐紮在此，建立了自己的王國。
text.mo.tutorial30 = [#00ffce]...呃，蒼穹們的敵意並不強，你懂的。
text.mo.tutorial31 = [#00ffce]但那也不意味著你們不需要任何防禦工事。
text.mo.tutorial32 = [#00ffce]下一步，建造炮塔，對你們應該輕而易舉。
text.mo.tutorial33 = [#00ffce]所以...我想我的工作就到此為止啦。
text.mo.tutorial34 = [#00ffce]感謝你們的配合，以及...
text.mo.tutorial35 = [#00ffce]...祝好運。
text.mo.wave = 蒼穹們開始進攻

#疫械集群
text.fungitron.info1 = 使用[accent]銀子彈或孢子炸彈[]來對付菌噬體。
text.fungitron.info2 = 菌噬體嘗試[accent]追逐時[]可趁機建造炸彈。
text.fungitron.info3 = 重生次數限製：[accent]5次。

#裂空戰艦
text.zentack.info1 = 攻擊西擊艦的[accent]弱點[]來摧毀它。
text.zentack.info2 = 試著在[accent]要塞被擊落前[]結束戰鬥。
text.zentack.info3 = 重生次數限製：[accent]3次。

#瓜星領主
text.chiniun.info1 = 向後方攻擊可釋放[accent]幹擾彈。
text.chiniun.info2 = 幹擾彈能[accent]打斷[]慶雲帶有[red]蓄力圈[]的招式。
text.chiniun.info3 = 每三次打斷會使慶雲[accent]失衡並掉落西瓜。
text.chiniun.info4 = 失衡狀態下幹擾彈可造成[accent]大量傷害。
text.chiniun.info5 = 建造[accent]鐵墻[]來抵禦[red]震蕩波
text.chiniun.info6 = 啟用[accent]助推[]來越過[accent]對地沖擊波。
text.chiniun.info7 = 重生次數限製：[accent]無限製。