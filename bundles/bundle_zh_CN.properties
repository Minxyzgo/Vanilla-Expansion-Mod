#——教程区块——

#地面粉碎机
text.tutorial-fc.tutorial1 = 赛克兰特上[accent]没有矿脉形式的钛[]。
text.tutorial-fc.tutorial2 = 因此钛需要从[accent]页岩[]中提炼得到。
text.tutorial-fc.tutorial3 = 试着使用[accent]地面粉碎机[]开采页岩，并将其送入[accent]钛提炼厂[]加工。
text.tutorial-fc.tutorial4 = 地面粉碎机同样可以开采[accent]炭质页岩[]。
text.tutorial-fc.tutorial5 = 在[accent]碳岩硅冶炼厂[]中，炭质页岩可被直接精炼成硅。
text.tutorial-fc.tutorial6 = 试着依靠炭质页岩获取一些硅。
text.tutorial-fc.tutorial7 = 除了特殊岩石，地面粉碎机对开采[accent]硫化物[]也有更高的效率。
text.tutorial-fc.tutorial8 = 教程结束。
#阻敌墙
text.tutorial-bw.tutorial1 = [accent]阻敌墙[]是一种带有小型力场的特殊墙体。
text.tutorial-bw.tutorial2 = 它的力场能够[accent]阻挡[]敌方单位和穿透性炮弹[accent]越过防线。
text.tutorial-bw.tutorial3 = 尝试补全阻敌墙，防御敌方[accent]轰炸机。
text.tutorial-bw.tutorial4 = [accent]重型阻敌墙[]有同样的作用，但是更加坚固。
text.tutorial-bw.tutorial5 = 补全重型阻敌墙，抵抗更多来袭的敌人。
text.tutorial-bw.tutorial6 = 阻敌墙也可以拦下[accent]钍庞庞堆爆炸的冲击波。
text.tutorial-bw.tutorial7 = 确保防线完整以应对冲击波。
text.tutorial-bw.tutorial8 = 教程结束。
#装配选择器
text.tutorial-as.tutorial1 = [accent]组装厂[]需要输入所需的[accent]载荷[]来制造单位。
text.tutorial-as.tutorial2 = 将[accent]组装打包机的选项设置为[accent]超级组装套件[]
text.tutorial-as.tutorial3 = 利用指挥或手动操控[accent]弩炮[]使其进入组装厂上的载荷轨道
text.tutorial-as.tutorial4 = 单个组装厂有多种制造方案，但不能直接选择。
text.tutorial-as.tutorial5 = 此时需要使用[accent]装配选择器[]改变组装厂的模块等级以切换方案。
text.tutorial-as.tutorial6 = 将[accent]一型装配选择器[]正面紧贴组装厂的区域边界放置
text.tutorial-as.tutorial7 = 此时组装厂的模块等级由0级变为1级，可进行列表中的第二个方案。
text.tutorial-as.tutorial8 = 让[accent]耀斑[]进入组装厂
text.tutorial-as.tutorial9 = 将模块等级进一步升高时，[accent]不能移除[]先前放置的选择器。
text.tutorial-as.tutorial10 = 例如同时带有一、二型选择器才能使模块等级升高到2级，仅有二型则不行。
text.tutorial-as.tutorial11 = 试着生产剩下两种方案的单位。
text.tutorial-as.tutorial12 = 教程结束。

#——剧情与提示——

#谈判点
text.ng.gift1 = [#00ffce]你好呀。这里是Lacuna。
text.ng.gift2 = [#00ffce]如你所见，我们刚刚和[#f25555]Crux[#00ffce]结盟了。
text.ng.gift3 = [#00ffce]但我们没有任何要把你们赶出玛瑞斯的打算。
text.ng.gift4 = [#00ffce]说真的，我们讨厌战争。
text.ng.gift5 = [#00ffce]不过让你俩停战，看来已经不可能了。
text.ng.gift6 = [#00ffce]所以我们也想帮助你们，就当是...雨露均沾？
text.ng.gift7 = [#00ffce]稍等。
text.ng.gift8 = [#00ffce]这是一些用于启动的物资，主要是石英。
text.ng.gift9 = [#00ffce]毕竟这儿的土壤跟你们星球上的差别很大。
text.ng.gift10 = [#00ffce]一会我们会派些单位来进攻。
text.ng.gift11 = [#00ffce]是Crux安排的，我为此感到抱歉。
text.ng.gift12 = [#00ffce]然后...如果你们对我们的科技感兴趣的话...
text.ng.gift13 = [#00ffce]飞碟、等离子武器之类的...
text.ng.gift14 = [#00ffce]就发射到为你们准备的据点吧。
text.ng.gift15 = [#00ffce]摧毁它们，就能得到相应科技的数据。
text.ng.gift16 = [#00ffce]另外，如果你们需要物资转移...
text.ng.gift17 = [#00ffce]这儿也设有专门的地区。
text.ng.gift18 = [#00ffce]总之，祝好运。

#镜林潭
text.ms.gift1 = [#00ffce]你好呀。又是我。
text.ms.gift2 = [#00ffce]这儿是玛瑞斯的沼泽地区。
text.ms.gift3 = [#00ffce]沼泽分布着大量的[#ff6b41]铬[#00ffce]，和一揪揪[#f5e1eb]银[#00ffce]。
text.ms.gift4 = [#00ffce]催化质的新配方需要银。
text.ms.gift5 = [#00ffce]但或许也是这儿目前唯一用得到银的地方了。
text.ms.gift6 = [#00ffce]拿好嘞，赶快开始建立基地吧。
text.ms.gift7 = [#00ffce]Crux的单位正在接近这里。你也知道那家伙有多生气。
text.ms.gift8 = [#00ffce]祝好运。

#寒尘界限
text.ib.anchor1 = [#00ffce]呦，你来了。
text.ib.anchor2 = [#00ffce]接下来就由我…
text.ib.anchor3 = [#00ffce]...牛福
text.ib.anchor4 = [#00ffce]呃，刚才用的空包弹，没啥事儿。
text.ib.anchor5 = [#00ffce]总之…这是个[accent]物流锚点。
text.ib.anchor6 = [#00ffce]你可以选择一个配方，用[#f5e1eb]银[#00ffce]来交易。
text.ib.anchor7 = [#00ffce]冰川地区的银矿分布多，所以这…
text.ib.anchor8 = [#00ffce]哈喽，指挥官派我来捎个信。
text.ib.anchor9 = [#00ffce]上边儿说，我们也有其他类型的物流锚点。
text.ib.anchor10 = [#00ffce]你们可以通过获取科技或前往我们的据点来获得它们。
text.ib.anchor11 = [#00ffce]物资转移据点的锚点无限供应特定的物资。
text.ib.anchor12 = [#00ffce]另一些则能在解锁其产品后获取。
text.ib.anchor13 = [#00ffce]祝好运。完毕，拜拜喽。

#始瓜地区
text.mo.dialog.intro1 = [#00ffce]你好呀。
text.mo.dialog.intro2 = [#00ffce]这里是Lacuna，来自[#de8a5b]玛瑞斯[#00ffce]的阵营。
text.mo.dialog.intro3 = [#00ffce]我们并非来此宣战，只是一小笔交易。
text.mo.dialog.intro4 = [#00ffce]你瞧，[#88c961]西楚洛斯[#00ffce]...它跟别的星球有些不同。
text.mo.dialog.intro5 = [#00ffce]它是西瓜构成的。没有硅。
text.mo.dialog.intro6 = [#00ffce]由于一次运输事故...
text.mo.dialog.intro7 = [#9f8c88]铁[#00ffce]和[#f5e1eb]银[#00ffce]资源散落到了这里。
text.mo.dialog.intro8 = [#00ffce]我们对银的需求量很大。它于我们而言相当宝贵。
text.mo.dialog.intro9 = [#00ffce]我们千方百计尝试回收，却一点成效都没有。
text.mo.dialog.intro10 = [#00ffce]不过我们发现你们的采矿能力很强。
text.mo.dialog.intro11 = [#00ffce]所以，若你们愿意伸出援手...
text.mo.dialog.intro12 = [#00ffce]我们保证为你们提供[accent]硅与石墨[#00ffce]的补给。
text.mo.dialog.intro13 = [#00ffce]好了，让我来带你开局吧。
text.mo.dialog.intro14 = [#00ffce]...哦草，你的单位挖不了铁。
text.mo.dialog.intro15 = [#00ffce]稍等。
text.mo.dialog.intro16 = [#00ffce]搞定。
text.mo.tutorial1 = [#00ffce]首先，研究并在此放置[accent]矿物采集器[#00ffce]来开采[#9f8c88]铁。
text.mo.tutorial2 = [#00ffce]接着，研究[accent]铁传送带[#00ffce]，把物资传输到你的核心。
text.mo.tutorial3 = [#00ffce]再多来些怎么样？
text.mo.tutorial4 = [#00ffce]好嘞。咱们也开采一些[#f5e1eb]银[#00ffce]吧？
text.mo.tutorial5 = [#00ffce]继续保持。
text.mo.tutorial6 = [#00ffce]是时候引入电力了！先挖点瓜瓤土吧。
text.mo.tutorial7 = [#00ffce]研究[accent]西瓜电池、电缆和分配阀[#00ffce]来构建一个简易发电机组。
text.mo.tutorial8 = [#00ffce]等你完成了，就放置一个[accent]硅氧化器[#00ffce]，我会引导你接下来怎么做。
text.mo.tutorial9 = [#00ffce]伙计，不错嘛。
text.mo.tutorial10 = [#00ffce]要接收补给，你需要用到我们的一台装置。
text.mo.tutorial11 = [#00ffce]看好了，贸易传送塔！
text.mo.tutorial12 = [#00ffce]向装置里输入足够的银，它就会送来一批物资。
text.mo.tutorial13 = [#00ffce]来试试吧。
text.mo.tutorial13.task = 向[accent]贸易传送塔[]输入[accent]银
text.mo.tutorial14 = [#00ffce]漂亮！现在可以把物资运回核心了。
text.mo.tutorial15 = [#00ffce]你可能讨厌用电缆输电...
text.mo.tutorial16 = [#00ffce]但是别担心！只要你拿到[#f0d7d7]石英[#00ffce]，就能继续用电力节点啦！
text.mo.tutorial17 = [#00ffce]借由硅氧化器，硅可被转化成石英。
text.mo.tutorial18 = [#00ffce]用硅氧化器制作石英。
text.mo.tutorial19 = [#00ffce]在煤矿脉附近建造一台[accent]回旋涡轮机[#00ffce]来进入下一步。
text.mo.tutorial20 = [#00ffce]这台发电机比西瓜电池的效率高了不少。
text.mo.tutorial21 = [#00ffce]但它需要矿物采集器挖不了的煤炭。
text.mo.tutorial22 = [#00ffce]因此，[accent]电磁采矿机[#00ffce]是全自动供给它们的最佳选择。
text.mo.tutorial23 = [#00ffce]研究并在此放置一台电磁采矿机。
text.mo.tutorial24 = [#00ffce]当一切就绪，[#ffa665]就放一个铁墙吧。
text.mo.tutorial25 = [#00ffce]你们一直在对付的敌人...就是[#f25555]Crux[#00ffce]，对吧？
text.mo.tutorial26 = [#00ffce]在它们的跨星球航行过程中...
text.mo.tutorial27 = [#00ffce]一支舰队偏航了，着陆在西楚洛斯。
text.mo.tutorial28 = [#f25555]苍穹们[#00ffce]，并没有尝试回到[#90dbff]赛克兰特。
text.mo.tutorial29 = [#00ffce]它们驻扎在此，建立了自己的王国。
text.mo.tutorial30 = [#00ffce]...呃，苍穹们的敌意并不强，你懂的。
text.mo.tutorial31 = [#00ffce]但那也不意味着你们不需要任何防御工事。
text.mo.tutorial32 = [#00ffce]下一步，建造炮塔，对你们应该轻而易举。
text.mo.tutorial33 = [#00ffce]所以...我想我的工作就到此为止啦。
text.mo.tutorial34 = [#00ffce]感谢你们的配合，以及...
text.mo.tutorial35 = [#00ffce]...祝好运。
text.mo.wave = 苍穹们开始进攻

#疫械集群
text.fungitron.info1 = 使用[accent]银子弹或孢子炸弹[]来对付菌噬体。
text.fungitron.info2 = 菌噬体尝试[accent]追逐时[]可趁机建造炸弹。
text.fungitron.info3 = 重生次数限制：[accent]5次。

#裂空战舰
text.zentack.info1 = 攻击西击舰的[accent]弱点[]来摧毁它。
text.zentack.info2 = 试着在[accent]要塞被击落前[]结束战斗。
text.zentack.info3 = 重生次数限制：[accent]3次。

#瓜星领主
text.chiniun.info1 = 向后方攻击可释放[accent]干扰弹。
text.chiniun.info2 = 干扰弹能[accent]打断[]庆云君带有[red]蓄力圈[]的招式。
text.chiniun.info3 = 每三次打断会使庆云君[accent]失衡并掉落西瓜。
text.chiniun.info4 = 失衡状态下干扰弹可造成[accent]大量伤害。
text.chiniun.info5 = 建造[accent]铁墙[]来抵御[red]震荡波
text.chiniun.info6 = 启用[accent]助推[]来越过[accent]对地冲击波。
text.chiniun.info7 = 重生次数限制：[accent]无限制。