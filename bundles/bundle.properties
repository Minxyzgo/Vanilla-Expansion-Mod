#赛克兰特-主线
sector.ve-barrier-hill.name = Barrier Hill
sector.ve-barrier-hill.description = The hill is suitable for a primary development. \nResearch [accent]isomorphic technologies[] from derelicts, preparing for defense.
sector.ve-barrier-hill.details = Before landing at Ground Zero, Crux had already arrived at [#90DBFF]Cyclant[] through the accelerator. Enemies existing on Serpulo were just simple-minded, discarded programs.
sector.ve-carbon-relics.name = Carbon Relics
sector.ve-carbon-relics.description = Crux has spotted our behaviors. [red]Units of known types[] have been detected nearby.\nProduce [accent]quartz[] and [accent]silicon[] to build defense.
sector.ve-carbon-relics.details = These units are not only more powerful than those on Serpulo, but similar to them. They might be the creations of Crux themselves.
sector.ve-wetland-miningfield.name = Wetland Mines
sector.ve-wetland-miningfield.description = Crux is building a resource station here. \nTry capturing the sector with naval units for researching requirements.
sector.ve-intervalley.name = Intervalleys
sector.ve-intervalley.description = More [red]strengthened units[] have been detected.\nGain data from derelicts, researching [accent]silicide[].
sector.ve-intervalley.details = Such material existed for thousands of years is working incredibly well under strengthened units' attack.
sector.ve-volcanic-top.name = Volcanic Flats
sector.ve-volcanic-top.description = The volcano just erupted. Crux came for geothermal energy.\nUse [accent]hoverships[] to fly across the deadly lava streams, destroying the cores.
sector.ve-volcanic-top.details = While researching hoverships, develop [accent]another type of them[] to support.
sector.ve-fort-port.name = Fort Port
sector.ve-fort-port.description = [accent]Chrome[] appears to be on this island. Mine chrome to get fluid technologies upgraded, defending enemies rushing from all the directions.
sector.ve-gobi.name = Gobi
sector.ve-gobi.description = An enemy base is set on the gobi which has water pools. Additionally, there are [accent]advanced launch pads[] designed for Cyclant's atmosphere.\nGet the data and extract [accent]titanium[] from shale cobbles, building up a new cargo system for future attacks.
sector.ve-fungus-factory.name = Fungus Factory
sector.ve-fungus-factory.description = Crux got the spore synthesis technology back. Now they are producing spore pods in this sector.\nIn order to prevent Cyclant from becoming the second Serpulo, it's necessary to avoid destructing any [red]cultivator[] at the enemy base.\nDevelop a safe version of cultivator, producing oil for [accent]plastanium[] crafting.
sector.ve-unit-laboratory.name = Unit Lab
sector.ve-unit-laboratory.description = The source of [red]strengthened units[], a large, well-protected facility.\nCapture it, gaining the new units.
sector.ve-shale-quarry.name = Shale Quarry
sector.ve-shale-quarry.description = [accent]Oil[] resource is common here.\nMine [accent]cobalt[] and craft [accent]fibralt[], improving buildings and armies.
sector.ve-ruins.name = Ruins
sector.ve-ruins.description = Crux took control of an [orange]unknown team[]'s base, which was probably the origin of Cyclant technologies.\nUse the large amount of chromium to craft [accent]surge alloy[].
sector.ve-thorium-hacienda.name = Thorium Hacienda
sector.ve-thorium-hacienda.description = The sector is dotted with a large quantity of [accent]thorium[] ore. Enemy mining facilities covered somewhere too.\nCapture the resource, constructing stronger defense.
sector.ve-nuclear-powerplant.name = Nuclear Powerplant
sector.ve-nuclear-powerplant.description = Crux's power production center.\nBe aware of the [red]thorium blasters[], destroying enemy cores by steps. This will greatly damage Crux's cargo system.
sector.ve-warp-tech-base.name = Warp Tech Base
sector.ve-warp-tech-base.description = Crux is researching something about space technology here.\nUse the new technology to help ground units attack the enemy bases.
sector.ve-prime-route.name = Prime Route
sector.ve-prime-route.description = There is Crux's main transportation route.\nQuickly build up facilities to handle their attacks.
sector.ve-planetary-cargo-center.name = Planetary Cargo Center
sector.ve-planetary-cargo-center.description = This sector frequently launchs and receives resource, revealing its identity, Crux's cargo center.\nBring destruction to it, completely shutting down their supplies.
sector.ve-retreat-zone.name = Retreat Zone
sector.ve-retreat-zone.description = In such a case of emergency, Crux rushed to build another launch terminal, planning to retreat.\nDestroy their cores and acclerators as fast as possible.
#赛克兰特-支线
sector.ve-isolate-island.name = Isolate Island
sector.ve-isolate-island.description = [#90dbff]Optional Sector[]\nThe island stays far away from the main lands. Ruined biologic facilities lie on its surface.\nBefore enemies' arrival, create a kind of [accent]hybrid creature[], fighting against Crux's armies using its dangerous feature.
sector.ve-silicon-facility.name = Silicon Facility
sector.ve-silicon-facility.description = [#90dbff]Optional Sector[]\nThere's an enemy supplying base of silicon. Try to destroy it with newly gained [accent]strengthened units[].
sector.ve-blast-test.name = Blast Test
sector.ve-blast-test.description = [#90dbff]Optional Sector[]\nThe origin of Thorium Blasters. Now its ruined surface has been covered by a newly-built facility of phase fabric production.\n Capture this sector to get more thorium units.
sector.ve-cross-forest.name = Cross Forest
sector.ve-cross-forest.description = [#90dbff]Optional Sector[]\nForest has taken up most of the space. Tear those trees down for factories if necessary.

