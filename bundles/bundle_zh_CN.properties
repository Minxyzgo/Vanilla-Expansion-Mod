unit.ve-thorium-blaster.description = [#ffd37f]特殊单位[]\n爬向敌人并自爆。能跨越大多数地形。\n两侧的副炮可辅助清除诱爆障碍。
unit.ve-thorium-bomber.description = [#ffd37f]特殊单位[]\n将热量以等离子火焰形式喷向敌人，引燃建筑。\n被击落后会爆炸。
