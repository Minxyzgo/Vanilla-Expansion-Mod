#西瓤星-蒼穹描述
unit.ve-zenith-mortar-sharded.description = [#ffa665]進階蒼穹[]\n發射對地火炮。
unit.ve-zenith-small-sharded.description = [#ffa665]普通蒼穹[]\n小體型的蒼穹。發射爆炸子彈。
unit.ve-zenith-small-interceptor-sharded.description = [#ffa665]進階蒼穹[]\n向空中敵人發射激光彈，攻速逐漸提高。\n能產生小型力場墻保護自己。
unit.ve-zenith-small-builder-sharded.description = [#ffa665]普通蒼穹[]\n負責輔助建造與維修的小體型蒼穹。
unit.ve-zenith-small-miner-sharded.description = [#ffa665]普通蒼穹[]\n負責采礦的小體型蒼穹。
unit.ve-zenith-supporter-sharded.description = [#ffa665]進階蒼穹[]\n具有綜合基礎輔助能力。\n可發射帶電導彈進行攻擊。
unit.ve-zenith-rocketeer-sharded.description = [#ffa665]進階蒼穹[]\n向遠處一次發射四枚高速追蹤導彈。
unit.ve-zenith-rocketeer-elite-sharded.description = [#ffa665]進階蒼穹[]\n向遠處一次發射八枚高速追蹤導彈。\n原有的武器改裝為等離子炮。
unit.ve-zenith-magician-sharded.description = [#ffa665]特種蒼穹[]\n召喚閃電束劈在敵人附近。\n能生成多個閃電球圍繞自己或附著在敵人上，並持續釋放帶電子彈。
unit.ve-zenith-elite-sharded.description = [#ffa665]普通蒼穹[]\n發射一連串等離子爆炸電球。
unit.ve-zenith-sweeper-sharded.description = [#ffa665]進階蒼穹[]\n噴射穿透性火焰焚燒敵人。\n墜毀後會引燃一片區域。
