block.ve-blaster.description = 用硫化物和孢子荚合成爆炸混合物。
block.ve-nitroalkoss-cultivator.description = 培养并产出硝烃藓。
block.ve-decomposer.description = 从废料中回收并拆解一些部件。
block.ve-lava-cooler.description = 冷却熔岩并从中分离沙子。
block.ve-hydraulic-press.description = 将煤炭压缩成石墨，需要水来运转。
block.ve-spore-blender.description = 将孢子荚转化成石油。
block.ve-carbon-shale-smelter.description = 用炭质页岩冶炼硅。
block.ve-titanium-extractor.description = 从页岩中提炼金属钛。
block.ve-gasification-chamber.description = 用煤炭在水蒸气中气化得到氢气并自动燃烧处理不需要的废气。
