text.ff.info1 = 進攻時請勿破壞敵方培養機！
text.ff.info2 = 敵方預計在4分鐘後開始進攻
text.ff.info3 = 敵方開始進攻
text.ff.failure = 檢測到孢子泄漏，準備時間倒流！
text.pr.warp = [#f25555]檢測到敵軍躍遷
