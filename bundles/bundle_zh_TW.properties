unit.ve-plasm.description = [#00ffce]T2飛碟[]\n發射一串小等離子球。
unit.ve-surge.description = [#00ffce]T3飛碟[]\n發射等離子追蹤導彈。
unit.ve-surge-missile.description = 
unit.ve-tide.description = [#00ffce]T4飛碟[]\n發射大型等離子球和持續的等離子束。
unit.ve-thunder.description = [#00ffce]T5飛碟[]\n充能一段時間後發射威力巨大的高能粒子流。
unit.ve-vibrate.description = [#00ffce]T1渦旋車[]\n發射震蕩彈短暫地定住敵人。\n螺旋形履帶使它更適合在不平整的地面上行駛。
unit.ve-shake.description = [#00ffce]T2渦旋車[]\n發射散布等離子球灼燒一片區域。
unit.ve-quake.description = [#00ffce]T3渦旋車[]\n向地面投放穿透等離子束爆破途徑的區域。\n可用力場保護周圍的己方單位。
