unit.ve-thorium-eradicator.description = [#f25555]BOSS[]\n向前方爆发出巨大的持续性激光束并发射子弹或炸弹。被击毁后会剧烈爆炸，释放冲击波摧毁大范围内未受保护的敌方建筑。
unit.ve-huge-dagger.description = [#f25555]BOSS[]\n交替发射巨型分裂炮弹。\n巨大的体型使其能直接在深水中行走。
unit.ve-hyper.description = [#f25555]BOSS[]\n产生大范围能量场，其核心能向正下方持续发射强力光束，或向远处弹射球形能量弹。搭载多对高频爆炸激光弹炮台和电磁脉冲导弹架。\n能自动修复周围的己方单位与建筑并电击敌人。可为周围的己方单位提供护盾。能提高周围己方单位的建造速度。
