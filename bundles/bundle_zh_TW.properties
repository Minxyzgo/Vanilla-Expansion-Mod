sector.ve-classic-175.name = 175
sector.ve-classic-175.description = 零號地區旁有[accent]鈦[]礦分布的區塊，適合作為初期據點。
sector.ve-classic-222.name = 222
sector.ve-classic-222.description = 存在豐富鈦礦與石油資源的區塊，適合用來大規模生產[accent]塑鋼[]。
sector.ve-classic-223.name = 223
sector.ve-classic-223.description = 擁有大量汙水和[accent]釷[]礦分布的區塊，適合作為遠程生產與發射物資的重要據點。
sector.ve-classic-85.name = 85
