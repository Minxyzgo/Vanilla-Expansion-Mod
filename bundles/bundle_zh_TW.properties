#西瓤星-武裝載具描述
unit.ve-sentinel-sharded.description = [#ffd37f]武裝載具[]\n向大範圍內的敵人蓄力發射等離子炮彈。\n不能自行移動。
unit.ve-gatling-mech-sharded.description = [#ffd37f]武裝載具[]\n裝載一臺重機槍的四足機甲，移動緩慢但火力強勁。
unit.ve-combat-engineer.description = [#ffd37f]武裝載具[]\n既能輔助建造、采礦和維修，又能發射帶電分裂導彈攻擊敵人。裝有修復場和一對單點防禦炮臺。
unit.ve-micro-mech-sharded.description = [#ffd37f]武裝載具[]\n交替發射穿甲彈，移動速度較快。
