unit.ve-thorium-eradicator.description = [#f25555]BOSS[]\n向前方爆發出巨大的持續性激光束並發射子彈或炸彈。被擊毀後會劇烈爆炸，釋放沖擊波摧毀大範圍內未受保護的敵方建築。
unit.ve-huge-dagger.description = [#f25555]BOSS[]\n交替發射巨型分裂炮彈。\n巨大的體型使其能直接在深水中行走。
unit.ve-hyper.description = [#f25555]BOSS[]\n產生大範圍能量場，其核心能向正下方持續發射強力光束，或向遠處彈射球形能量彈。搭載多對高頻爆炸激光彈炮臺和電磁脈沖導彈架。\n能自動修復周圍的己方單位與建築並電擊敵人。可為周圍的己方單位提供護盾。能提高周圍己方單位的建造速度。
