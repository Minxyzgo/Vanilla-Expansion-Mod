#核心机描述
unit.ve-delta.description = [#ffd37f]T4赛克兰特核心机[]\n保护四代核心，可建造及搬运建筑。\n挂载一对加速导弹发射器。可另用机炮发射一连串旋转穿甲弹。
unit.ve-omega.description = [#ffd37f]T5赛克兰特核心机[]\n保护终代核心，可建造及搬运建筑。\n攻击时架起穿透性激光炮，还能连续发射高速带电追踪子弹。可用小型弧形力场保护自己。
unit.ve-theta.description = [#ffd37f]T1赛克兰特核心机[]\n保护同构初代核心，可建造建筑。\n可交替发射激光弹。
unit.ve-lambda.description = [#ffd37f]T2赛克兰特核心机[]\n保护同构次代核心，可建造建筑。\n能蓄力并发射小光球。
unit.ve-sigma.description = [#ffd37f]T3赛克兰特核心机[]\n保护同构三代核心，可建造建筑。\n能展开机炮快速交替发射带电追踪子弹。
unit.ve-omega-observer.description = 
unit.ve-zeta.description = [#ffd37f]T1玛瑞斯机甲核心机[]\n
unit.ve-eta.description = [#ffd37f]T2玛瑞斯机甲核心机[]\n
unit.ve-kappa.description = [#ffd37f]T1玛瑞斯飞船核心机[]\n
unit.ve-xi.description = [#ffd37f]T2玛瑞斯飞船核心机[]\n
unit.ve-omicron.description = [#ffd37f]玛瑞斯飞碟核心机[]\n
unit.ve-iota-fungikiller.description = [#ffd37f]西楚洛斯核心机[]\n装载银子弹机炮，可有效杀伤孢染机械。
unit.ve-iota-stg.description = [#ffd37f]西楚洛斯核心机[]\n向右连续发射能量弹。
unit.ve-iota.description = [#ffd37f]西楚洛斯核心机[]\n连发激光弹维修己方建筑。\n可改装成其他型号。
unit.ve-iota-stealth.description = [#ffd37f]西楚洛斯核心机[]\n未装有武器，能够缓慢自我修复。
unit.ve-iota-final.description = [#ffd37f]西楚洛斯核心机[]\n能快速发射一连串激光弹进行攻击。\n向背后攻击可释放追踪干扰弹。\n能够助推躲避地面上的威胁。
