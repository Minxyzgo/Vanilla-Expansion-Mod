#——教程区块——

#地面粉碎机
text.tutorial-fc.tutorial1 = There's no [accent]titanium of ore form[] on Cyclant.
text.tutorial-fc.tutorial2 = So [accent]shale[] is necessary for producing titanium.
text.tutorial-fc.tutorial3 = Try to use [accent]floor crushers[] to mine shale and send them into [accent]titanium extractors[].
text.tutorial-fc.tutorial4 = Floor crushers can also mine [accent]carbon shale.
text.tutorial-fc.tutorial5 = With [accent]carbon shale smelters[], silicon can be gained from carbon shale.
text.tutorial-fc.tutorial6 = Try to produce silicon with carbon shale.
text.tutorial-fc.tutorial7 = Additionally, floor crushers do well in mining [accent]pyratite[].
text.tutorial-fc.tutorial8 = Tutorial ends.

#阻敌墙
text.tutorial-bw.tutorial1 = [accent]Blocking walls[] are the sort of walls which can generates small forcefields.
text.tutorial-bw.tutorial2 = Their forcefields can [accent]block[] any enemy unit and piercing artillery. 
text.tutorial-bw.tutorial3 = Try to build some blocking walls and defend against enemy bombers.
text.tutorial-bw.tutorial4 = [accent]Silicide blocking walls[] have more health and armor than normal ones.
text.tutorial-bw.tutorial5 = Use them to defend against more enemies.
text.tutorial-bw.tutorial6 = Those walls can also block [accent]the explosion shockwave of Thorium Eradicators.
text.tutorial-bw.tutorial7 = Keep the defensive line fully-repaired.
text.tutorial-bw.tutorial8 = Tutorial ends.

#装配选择器
text.tutorial-as.tutorial1 = [accent]Assemblers[] needs required [accent]payloads[] to build units.
text.tutorial-as.tutorial2 = Set the option of [accent]Assemble Packer[] to [accent]Super Assemble Pack[]
text.tutorial-as.tutorial3 = Use command mode or mannual control to let [accent]Ballistic[] enter the assembler.
text.tutorial-as.tutorial4 = One assembler can have multiple plans. But cannot be switched mannually.
text.tutorial-as.tutorial5 = [accent]Assemble Selectors[] are needed for such situation.
text.tutorial-as.tutorial6 = Place [accent]Assemble Selector I[] by the edge of the assembler's building zone.
text.tutorial-as.tutorial7 = The assembler is using the second plan now.
text.tutorial-as.tutorial8 = Let [accent]Solar[] enter the assembler.
text.tutorial-as.tutorial9 = Selectors of lower levels [accent]cannot be removed[] when switching to a higher one.
text.tutorial-as.tutorial10 = For instance, only when both selector I and II exist can make the assembler to use the third plan.
text.tutorial-as.tutorial11 = Try to build the rest two units.
text.tutorial-as.tutorial12 = Tutorial ends.

#——剧情与提示——

#谈判点
text.ng.gift1 = [#00ffce]HEY THERE. THIS IS LACUNA.
text.ng.gift2 = [#00ffce]WE JUST UNITED WITH [#f25555]CRUX[#00ffce], AS YOU'D NOTICED.
text.ng.gift3 = [#00ffce]BUT WE'RE NOT GONNA KICK YOU OUT OF MARESS, SERIOUSLY.
text.ng.gift4 = [#00ffce]TO BE HONEST, WE DON'T LIKE WARS.
text.ng.gift5 = [#00ffce]STOPPING THIS CAMPAIGN SEEMS TO BE REDICULOUS FOR NOW.
text.ng.gift6 = [#00ffce]SO WE'RE GOING TO HELP YOU TOO, AS... A BALANCE?
text.ng.gift7 = [#00ffce]HOLD A SEC.
text.ng.gift8 = [#00ffce]HERE'S SOME RESOURCE FOR STARTING. MAINLY QUARTZ.
text.ng.gift9 = [#00ffce]CUZ THE SOIL HERE IS DIFFERENT FROM YOUR PLANETS.
text.ng.gift10 = [#00ffce]LATER WE'RE GOING TO SEND A FEW UNITS TO ATTACK YOU.
text.ng.gift11 = [#00ffce]THAT'S CRUX'S COMMAND. SORRY ABOUT OUR OFFENSE.
text.ng.gift12 = [#00ffce]AND... IF YOU'RE INTO OUR TECHNOLOGIES...
text.ng.gift13 = [#00ffce]FLOATING SAUCERS, PLASMA WEAPONS, AND SOMETHING LIKE THAT...
text.ng.gift14 = [#00ffce]JUST LAUNCH TO THE BASES WE PREPARED FOR YOU.
text.ng.gift15 = [#00ffce]DESTROY THEM AND YOU'LL GAIN THEIR DATA.
text.ng.gift16 = [#00ffce]ALSO, IF YOU NEED SOME SORT OF RESOURCE TRANSFERENCE...
text.ng.gift17 = [#00ffce]THERE'RE REGIONS FOR THAT TOO.
text.ng.gift18 = [#00ffce]WELL, GOOD LUCK.

#镜林潭
text.ms.gift1 = [#00ffce]HEY THERE. IT'S ME AGAIN.
text.ms.gift2 = [#00ffce]HERE'S THE SWAMP AREA OF MARESS.
text.ms.gift3 = [#00ffce]YOU'LL FIND LOTS OF [#ff6b41]CHROME[#00ffce], AND A LITTLE BIT [#f5e1eb]SILVER[#00ffce] HERE.
text.ms.gift4 = [#00ffce]A NEW RECIPE OF CATALYZON REQUIRES SILVER.
text.ms.gift5 = [#00ffce]BUT IT MIGHT BE THE ONLY THING THAT NEEDS SILVER SO FAR.
text.ms.gift6 = [#00ffce]TAKE THIS. LET'S HURRY UP TO BUILD YOUR BASE.
text.ms.gift7 = [#00ffce]CRUX'S UNITS ARE APPROACHING. YOU KNOW HOW MAD THEY'RE.
text.ms.gift8 = [#00ffce]GOOD LUCK.

#寒尘界限
text.ib.anchor1 = [#00ffce]YO, THERE YOU ARE.
text.ib.anchor2 = [#00ffce]BEHOLD... THE...
text.ib.anchor3 = [#00ffce]...OH SHIT
text.ib.anchor4 = [#00ffce]UH I JUST USED BLANK MISSILES, DON'T WORRY.
text.ib.anchor5 = [#00ffce]WELL. EM. THIS IS A [accent]CARGO ANCHOR.
text.ib.anchor6 = [#00ffce]YOU CAN SELECT A RECIPE, AND TRADE BY [#f5e1eb]SILVER.
text.ib.anchor7 = [#00ffce]THE GLACIER AREA HAS LOTS OF SILVER. SO IT'S QUITE...
text.ib.anchor8 = [#00ffce]howdy. here's a message of my commander.
text.ib.anchor9 = [#00ffce]it says: we also have other types of cargo anchors.
text.ib.anchor10 = [#00ffce]you can gain them by extending your own tech tree or coming to our bases.
text.ib.anchor11 = [#00ffce]anchors in the supply bases infinitely provides certain resource.
text.ib.anchor12 = [#00ffce]others can be built after unlocking their products.
text.ib.anchor13 = [#00ffce]good luck. over, bye!


#始瓜地区
text.mo.dialog.intro1 = [#00ffce]HEY THERE.
text.mo.dialog.intro2 = [#00ffce]THIS IS LACUNA, THE FACTION FROM [#de8a5b]MARESS.
text.mo.dialog.intro3 = [#00ffce]WE'RE NOT COMING FOR BATTLES. JUST A SMALL DEAL.
text.mo.dialog.intro4 = [#00ffce]YOU SEE, [#88c961]SITRULLUS [#00ffce]IS... WELL, A BIT DIFFERENT FROM OTHERS.
text.mo.dialog.intro5 = [#00ffce]IT'S MADE OF WATERMELON. NO SILICON.
text.mo.dialog.intro6 = [#00ffce]AND DUE TO ONE TRANSPORTATION ACCIDENT...
text.mo.dialog.intro7 = [#9f8c88]FERRUM [#00ffce]AND [#f5e1eb]SILVER [#00ffce]RESOURCES HAD BEEN SHATTERED HERE.
text.mo.dialog.intro8 = [#00ffce]WE HAVE A LARGE DEMAND FOR SILVER. IT'S REALLY PRECIOUS TO US.
text.mo.dialog.intro9 = [#00ffce]PLENTY OF METHODS HAVE BEEN USED BUT NONE OF THEM WORKED THO.
text.mo.dialog.intro10 = [#00ffce]FORTUNATELY, WE'VE FOUND THAT YOU DID PRETTY WELL IN MINING.
text.mo.dialog.intro11 = [#00ffce]SO IF YOU'RE WILLING TO HELP US...
text.mo.dialog.intro12 = [#00ffce]WE PROMISE TO SUPPLY [accent]SILICON AND GRAPHITE [#00ffce]FOR YOU.
text.mo.dialog.intro13 = [#00ffce]ALRIGHT, LEMME GIVE YOU THE TUTORIAL TO GET STARTED.
text.mo.dialog.intro14 = [#00ffce]...OH SCREW IT, YOUR UNIT CAN'T MINE FERRUM.
text.mo.dialog.intro15 = [#00ffce]HOLD A SEC.
text.mo.dialog.intro16 = [#00ffce]OKAY.
text.mo.tutorial1 = [#00ffce]TO BEGIN WITH, RESEARCH [accent]COLLECTOR [#00ffce]AND PLACE ONE THERE TO MINE [#9f8c88]FERRUM.
text.mo.tutorial2 = [#00ffce]THEN, RESEARCH [accent]FERRIC CONVEYOR [#00ffce], TRANSFERRING FERRUM TO YOUR CORE.
text.mo.tutorial3 = [#00ffce]HOW ABOUT A LITTLE MORE?
text.mo.tutorial4 = [#00ffce]GREAT. YOU WON'T MIND HAVING SOME [#f5e1eb]SILVER [#00ffce]TOO, RIGHT?
text.mo.tutorial5 = [#00ffce]KEEP GOING.
text.mo.tutorial6 = [#00ffce]TIME TO GET POWERED! LET'S DIG SOME MELON DIRT FIRST.
text.mo.tutorial7 = [#00ffce]RESEARCH [accent]MELON CELL, CABLE AND DISTRIBUTE VALVE [#00ffce]TO CONSTRUCT A SIMPLE GENERATOR GROUP.
text.mo.tutorial8 = [#00ffce]AFTER YOU FINISH IT, BUILD A [accent]SILICON OXIDATOR, [#00ffce]I'LL TELL YOU WHAT'S THE NEXT.
text.mo.tutorial9 = [#00ffce]NICE WORK DUDE.
text.mo.tutorial10 = [#00ffce]TO GET SUPPLIES, ONE OF OUR DEVICE IS REQUIRED.
text.mo.tutorial11 = [#00ffce]BEHOLD, THE TRADE PORTAL!
text.mo.tutorial12 = [#00ffce]WHEN YOU INPUT SILVER INTO THE DEVICE, IT AUTOMATICALLY OUTPUTS SUPPLIES.
text.mo.tutorial13 = [#00ffce]LET'S HAVE A TRY.
text.mo.tutorial13.task = Input [accent]Silver []into [accent]Trade Portal
text.mo.tutorial14 = [#00ffce]GOOD JOB! BRING THEM BACK TO YOUR CORE.
text.mo.tutorial15 = [#00ffce]YOU MAY DISLIKE CONDUCTING POWER WITH CABLES.
text.mo.tutorial16 = [#00ffce]BUT DON'T WORRY! ONCE YOU GET [#f0d7d7]QUARTZ[#00ffce], POWER NODES RETURN!
text.mo.tutorial17 = [#00ffce]WITH SILICON OXIDATORS, YOU CAN TURN SILICON INTO QUARTZ.
text.mo.tutorial18 = [#00ffce]CRAFT QUARTZ THROUGH A SILICON OXIDATOR.
text.mo.tutorial19 = [#00ffce]BUILD A [accent]CYCLE TURBINE GENERATOR [#00ffce]NEAR THE COAL VEIN AND WE'LL CONTINUTE.
text.mo.tutorial20 = [#00ffce]THIS GENERATOR OUTPUTS MUCH MORE POWER THAN MELON CELLS.
text.mo.tutorial21 = [#00ffce]BUT IT NEEDS COAL, WHICH CANNOT BE MINED BY COLLECTORS.
text.mo.tutorial22 = [#00ffce]SO [accent]MAGNETIC DIGGERS [#00ffce]ARE THE BEST CANDIDATES TO PRODUCE COAL AUTOMATICALLY.
text.mo.tutorial23 = [#00ffce]RESEARCH AND BUILD A MAGNETIC DIGGER HERE.
text.mo.tutorial24 = [#00ffce]WHEN YOU THINK IT'S ENOUGH, [#ffa665]JUST BUILD A FERRUM WALL.
text.mo.tutorial25 = [#00ffce]THE ENEMY YOU HAVE BEEN FIGHTING AGAINST... IT WAS [#f25555]CRUX[#00ffce], RIGHT?
text.mo.tutorial26 = [#00ffce]WELL, DURING ITS INTERPLANETARY TRANSFERENCE...
text.mo.tutorial27 = [#00ffce]ONE OF ITS SQUADRON GOT LOST, LANDING ON SITRULLUS.
text.mo.tutorial28 = [#f25555]THE ZENITHS, [#00ffce]THEY DIDN'T ATTEMPT TO GET TO [#90dbff]CYCLANT.
text.mo.tutorial29 = [#00ffce]INSTEAD, THEY STAYED HERE AND FOUNDED THEIR OWN KINGDOM.
text.mo.tutorial30 = [#00ffce]...EHH, THEY ARE NOT THAT OFFENSIVE, YA'KNOW?
text.mo.tutorial31 = [#00ffce]BUT IT DOESN'T MEAN YOU DON'T NEED ANY DEFENSE.
text.mo.tutorial32 = [#00ffce]THE NEXT STEP SHOULD BE EASY FOR YOU. BUILD TURRETS AND WALLS.
text.mo.tutorial33 = [#00ffce]SO... I THINK MY TASK HAS BEEN DONE.
text.mo.tutorial34 = [#00ffce]THANK YOU FOR YOUR COOPERATION AND...
text.mo.tutorial35 = [#00ffce]...GOOD LUCK.
text.mo.wave = Zeniths begin to attack.

#疫械集群
text.fungitron.info1 = Use [accent]silver bullets or spore bombs []to damage Fungitron.
text.fungitron.info2 = It's better to build bombs while Fungitron is [accent]chasing you.
text.fungitron.info3 = Respawn limition: [accent]5 times.

#裂空战舰
text.zentack.info1 = Hit Zentack's [accent]weak points []to damage it.
text.zentack.info2 = Try to defeat it [accent]before your Oct falls.
text.zentack.info3 = Respawn limition: [accent]3 times.

#瓜星领主
text.chiniun.info1 = Attack from your backwards to release [accent]interrupting missiles.
text.chiniun.info2 = The missiles can [accent]interrupt []Chiniun's attacks with [red]charging rings.
text.chiniun.info3 = Each three interruptions makes Chiniun [accent]imbanlanced and drop watermelons.
text.chiniun.info4 = The missiles can cause [accent]huge damage []when Chiniun is imbanlanced.
text.chiniun.info5 = Build [accent]ferrum walls []to block [red]full-screen shockwaves.
text.chiniun.info6 = Enable [accent]boost []to jump over [accent]ground shockwaves.
text.chiniun.info7 = Respawn limition: [accent]no limition.