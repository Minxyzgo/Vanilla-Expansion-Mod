block.ve-large-turbine-generator.description = 利用燃料的燃烧推动涡轮发电，需要水来正常运转。
block.ve-isomorphic-reactor.description = 利用可控核裂变产生大量电力，冷冻液供应不足就会过热而剧烈爆炸。设置了更多燃料棒槽位，同时更改内部构造以提高能量利用率。
block.ve-geothermal-generator.description = 利用环境中的热源发电。
block.ve-radioactive-thermal-generator.description = 利用强放射性元素的衰变产热发电。
block.ve-node-blocker.description = 阻止电力节点跨越此元件与其他建筑自动连接。
block.ve-sector-power-tower.description = 远距离输送电力。
block.ve-solar-pad.description = 将太阳能更高效地转化为电能。
block.ve-charger.description = 将巨浪合金制成电容器并输入电力进行储存。
block.ve-discharger.description = 从巨浪合金电容器中输出电力。
block.ve-fusion-reactor.description = 利用可控核聚变产生巨量电力，启动时也需输入电力。
block.ve-micro-reactor.description = 利用可控核裂变产生电力，使用水来冷却，可用于初步供电。
block.ve-sodium-reactor.description = 利用钠与水反应的热量低效发电。\n产生的氢气不及时分离则会爆炸。
block.ve-lava-thermal-generator.description = 利用熔岩和水的温差产生电力。
block.ve-insulated-node.description = 只通过激光连接传输电力，不自动连接。
block.ve-sodium-sulphur-battery.description = 储存可观的电量。
