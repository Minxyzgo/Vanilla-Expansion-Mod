block.ve-catalyzon-crafter.description = 用各种原料合成并量产催化质。
block.ve-cell-laboratory.description = 进行细胞融合、诱导突变与筛选等操作。
block.ve-chain-transferer.description = 将纤钢转化为塑钢。
block.ve-warper.description = 激发相织布并用石英将其转化为幻位核。
block.ve-nitroalkoss-cultivator-silicide.description = 培养并产出硝烃藓，效率更高，更加坚固。
block.ve-fusion-refueller.description = 用氢与催化质合成聚变燃料。
block.ve-plant-press.description = 将植物质转化成煤炭和盐。
block.ve-surge-coagulator.description = 使用另一组原料快速冶炼巨浪合金。
block.ve-fusion-disfueller.description = 从聚变燃料中取出氢气。
block.ve-isomorphic-pulverizer.description = 将废料粉碎成沙子。
