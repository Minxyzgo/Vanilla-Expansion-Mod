#西楚洛斯-苍穹描述
unit.ve-zenith-mortar-sharded.description = [#ffa665]进阶苍穹[]\n发射对地火炮。
unit.ve-zenith-small-sharded.description = [#ffa665]普通苍穹[]\n小体型的苍穹。发射爆炸子弹。
unit.ve-zenith-small-interceptor-sharded.description = [#ffa665]进阶苍穹[]\n向空中敌人发射激光弹，攻速逐渐提高。\n能产生小型力场墙保护自己。
unit.ve-zenith-small-builder-sharded.description = [#ffa665]普通苍穹[]\n负责辅助建造与维修的小体型苍穹。
unit.ve-zenith-small-miner-sharded.description = [#ffa665]普通苍穹[]\n负责采矿的小体型苍穹。
unit.ve-zenith-supporter-sharded.description = [#ffa665]进阶苍穹[]\n具有综合基础辅助能力。\n可发射带电导弹进行攻击。
unit.ve-zenith-rocketeer-sharded.description = [#ffa665]进阶苍穹[]\n向远处一次发射四枚高速追踪导弹。
unit.ve-zenith-rocketeer-elite-sharded.description = [#ffa665]进阶苍穹[]\n向远处一次发射八枚高速追踪导弹。\n原有的武器改装为等离子炮。
unit.ve-zenith-magician-sharded.description = [#ffa665]特种苍穹[]\n召唤闪电束劈在敌人附近。\n能生成多个闪电球围绕自己或附着在敌人上，并持续释放带电子弹。
unit.ve-zenith-elite-sharded.description = [#ffa665]普通苍穹[]\n发射一连串等离子爆炸电球。
unit.ve-zenith-sweeper-sharded.description = [#ffa665]进阶苍穹[]\n喷射穿透性火焰焚烧敌人。\n坠毁后会引燃一片区域。
unit.ve-zenith-shielder-sharded.description = [#ffa665]进阶苍穹[]\n投射一面弧形力场墙阻碍敌人攻击。
