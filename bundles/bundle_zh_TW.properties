#颶風星-強化描述
unit.ve-solar.description = [#ffa665]T3強化戰門型空軍[]\n發射能在路徑及落點上分裂出小炸彈的大型炮彈。
unit.ve-plasma.description = [#ffa665]T2強化戰門型空軍[]\n向後下方連續投擲三枚燃燒彈，能直接引燃範圍內的敵方建築。
unit.ve-prominence.description = [#ffd37f]改裝單位[]\n發射火焰彈。能搬運單位與建築。
unit.ve-blade.description = [#ffa665]T1強化戰門型陸軍[]\n連續不斷地發射追蹤子彈。
unit.ve-lance.description = [#ffd37f]改裝單位[]\n交替發射分裂子彈。
unit.ve-aurora.description = [#ffa665]T1強化戰門型空軍[]\n發射帶電子彈。
unit.ve-point.description = [#98ffa9]T1強化支援型空軍[]\n自動開采礦物並將其放入核心中。\n不會被敵人鎖定，能緩慢自我修復。
unit.ve-line.description = [#98ffa9]T2強化支援型空軍[]\n發射加速電球。
unit.ve-line.details = 據測試，加速彈射物的射程與初速度呈正相關。
unit.ve-string.description = [#ffd37f]改裝單位[]\n發射黏附炸彈。
unit.ve-stardust.description = [#98ffa9]T1強化支援型陸軍[]\n散射激光彈。\n使用激光束和修復場修復己方單位。\n能夠助推。
unit.ve-hammer.description = [#ffa665]T2強化戰門型陸軍[]\n噴射礦渣和石油引燃擊中點的地面單位與建築。
unit.ve-hoe.description = [#ffd37f]改裝單位[]\n發射一連串破甲彈。
unit.ve-vortex.description = [#98ffa9]T2強化支援型陸軍[]\n發射一連串小電球。\n可為自己及周圍的單位提供護盾。\n通過一對單點防禦炮臺裂解來襲的子彈。\n能夠助推。
unit.ve-astrologe.description = [#ffd37f]改裝單位[]\n噴射等離子體引燃敵方單位與建築。\n用小型力場抵禦並反彈前方的攻擊。能夠助推。
unit.ve-ballistic.description = [#ffa665]T3強化戰門型陸軍[]\n發射迫擊炮彈和大型突刺彈。\n可為自己及周圍的單位提供護盾。
unit.ve-square.description = [#98ffa9]T3強化支援型空軍[]\n連續發射波動激光彈。\n使用兩道激光束修復己方單位。\n能壓製敵方修復系統。\n可用弧形力場保護自己和旁邊的己方單位。
unit.ve-plain.description = [#ffd37f]改裝單位[]\n發射電磁脈沖彈損傷敵方電網並提高己方建築的工作效率。
unit.ve-nebula.description = [#98ffa9]T3強化支援型陸軍[]\n向前彈射出大量電球。\n使用兩道激光束修復己方單位。\n產生分段式力場保護周圍的己方單位。能夠助推。
unit.ve-magnetic.description = [#ffa665]T4強化戰門型空軍[]\n發動猛烈的大型帶電子彈攻擊。
unit.ve-corona.description = [#ffa665]T5強化戰門型空軍[]\n發射多發大型穿透分裂炮彈並間斷地使用激光束熔化敵人。可向後方投擲小核彈，填裝時間長。
unit.ve-stereo.description = [#98ffa9]T4強化支援型空軍[]\n發射等離子炸彈和脈沖彈。\n通過一對單點防禦炮臺裂解來襲的子彈。\n能使用修復場修復己方單位。
unit.ve-firelock.description = [#ffa665]T4強化戰門型陸軍[]\n配備兩門電磁軌道炮。可用破甲彈近防。
unit.ve-meta.description = [#98ffa9]T5強化支援型空軍[]\n產生能量場，其核心可蓄力發射特殊能量彈。搭載兩對高頻爆炸激光彈炮臺。\n使用兩道激光束修復己方單位。通過兩對單點防禦炮臺裂解來襲的子彈。
unit.ve-galaxy.description = [#98ffa9]T4強化支援型陸軍[]\n發射六向分裂的黏附炸彈。\n使用多對激光束修復己方單位和建築。能夠助推。
unit.ve-universe.description = [#98ffa9]T5強化支援型陸軍[]\n在前方生成連鎖分裂電球並通過自動激光炮臺近防。\n可為周圍的己方單位提供護盾。\n使用多道激光束修復己方單位和建築。能夠助推
unit.ve-ray.description = [#ffa665]T5強化戰門型陸軍[]\n對前方發動直線轟炸。
