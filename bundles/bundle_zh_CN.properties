block.ve-quartz-separator-large.description = 更高效地从沙子中提取纯化石英。
block.ve-tissue-cultivator.description = 培养并产出植物组织，自带光源，可自动捕获空气中的繁殖体。
block.ve-isomorphic-smelter.description = 将石英冶炼成硅。
block.ve-isomorphic-kiln.description = 用沙子和铅烧制钢化玻璃。
block.ve-isomorphic-press.description = 将煤炭压缩成石墨。
