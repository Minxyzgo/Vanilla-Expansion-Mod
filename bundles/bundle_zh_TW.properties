#赤塵星-特種描述
unit.ve-shimmer.description = [#ff835e]T1無人機[]\n交替發射爆炸子彈。不受沙塵影響。
unit.ve-daybreak.description = [#ff835e]T2無人機[]\n發射高速穿透帶電子彈。
unit.ve-sunrise.description = [#ff835e]T3無人機[]\n炮擊地面敵人並發射爆炸子彈。
unit.ve-uprise.description = [#8ca9e8]T1熱空軍[]\n交替發射帶電激光束。不受極寒影響。
unit.ve-soar.description = [#8ca9e8]T2熱空軍[]\n使用多個小型電球炮臺進行攻擊。
unit.ve-hover.description = [#8ca9e8]T3熱空軍[]\n發射分裂電磁脈沖彈幹擾敵方電網運作並提高己方建築工作效率。
unit.ve-dive.description = [#8ca9e8]T5熱空軍[]\n發射一連串高速巡遊電球掃過敵方建築。
unit.ve-ambush.description = [#8ca9e8]T4熱空軍[]\n釋放若幹追蹤激光彈並使用一對反護甲射線進行攻擊。
