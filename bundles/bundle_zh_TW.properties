unit.ve-thorium-blaster.details = 由於設備裝載不全，它不能用於發電。
unit.ve-egnarra.description = [#ffd37f]特殊單位[]\n向地面敵人發射防陸炮彈。
unit.ve-alev.description = [#ffd37f]特殊單位[]\n竄出巨大的持續激光束，利用前坐力沖向並摧毀敵方建築。\n能夠助推，飛行速度更快。
unit.ve-toxorpion.description = [#ffd37f]特殊單位[]\n天蠍的改良版，主炮高度提升以加遠射程。
unit.ve-duplicator.description = [#ffd37f]特殊單位[]\n發射導彈。被擊毀後會分裂出小復製體，其一段時間後會重新恢復成復製體。
unit.ve-wide-fortress.description = [#ffd37f]特殊單位[]\n發射遠 程 火 炮。
unit.ve-fly-laser-drill.description = [#ffd37f]特殊單位[]\n飛行激光鉆頭。能開采釷。
unit.ve-eclire.description = [#ffd37f]特殊單位[]\n發射大量子彈。\n[#f25555]警告：此單位可能導致存檔損壞！
unit.ve-antumbright.description = [#ffd37f]特殊單位[]\n快速發射追蹤導彈和破甲彈。\n能發出彩色光。
unit.ve-md.description = [#ffd37f]特殊單位[]\n圓頭貓爹。
unit.ve-magnetic-small.description = [#ffd37f]特殊單位[]\n發動帶電子彈攻擊。
unit.ve-oct-painted.description = [#ffd37f]特殊單位[]\n花要塞。
unit.ve-crawler-aggelos.description = [#f25555]天使[]\n靠近敵人後自毀造成爆炸傷害。
unit.ve-frost-fortress.description = [#ffd37f]特殊單位[]\n發射冰鎮炮彈使敵人減速。
unit.ve-firebee.description = [#ffd37f]特殊單位[]\n發射單點脈沖激光和對地導彈。\n能緩慢自我修復。
unit.ve-melonic-array-core.description = [#ffd37f]特殊單位[]\n對大範圍內的敵人發動爆破激光束攻擊。\n可被西瓤陣列樁強化或治療。
