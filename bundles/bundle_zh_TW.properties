block.ve-large-turbine-generator.description = 利用燃料的燃燒推動渦輪發電，需要水來正常運轉。
block.ve-isomorphic-reactor.description = 利用可控核裂變產生大量電力，冷凍液供應不足就會過熱而劇烈爆炸。設置了更多燃料棒槽位，同時更改內部構造以提高能量利用率。
block.ve-geothermal-generator.description = 利用環境中的熱源發電。
block.ve-radioactive-thermal-generator.description = 利用強放射性元素的衰變產熱發電。
block.ve-node-blocker.description = 阻止電力節點跨越此元件與其他建築自動連接。
block.ve-sector-power-tower.description = 遠距離輸送電力。
block.ve-solar-pad.description = 將太陽能更高效地轉化為電能。
block.ve-charger.description = 將巨浪合金製成電容器並輸入電力進行儲存。
block.ve-discharger.description = 從巨浪合金電容器中輸出電力。
block.ve-fusion-reactor.description = 利用可控核聚變產生巨量電力，啟動時也需輸入電力。
block.ve-micro-reactor.description = 利用可控核裂變產生電力，使用水來冷卻，可用於初步供電。
block.ve-sodium-reactor.description = 利用鈉與水反應的熱量低效發電。\n產生的氫氣不及時分離則會爆炸。
block.ve-lava-thermal-generator.description = 利用熔巖和水的溫差產生電力。
block.ve-insulated-node.description = 只通過激光連接傳輸電力，不自動連接。
block.ve-sodium-sulphur-battery.description = 儲存可觀的電量。
